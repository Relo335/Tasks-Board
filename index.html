/* One line per platform across the week axis (sum of that platform's accounts). */
function mktPlatformWeekSeries(ents, metric){
  const dates=mktDates(ents);
  const plats=mktScopePlatforms().filter(p=>ents.some(e=>e.platform===p));
  const series=plats.map(p=>({label:p,color:MKT_PLATFORM_COLOR[p]||'var(--accent)',
    points:dates.map(d=>({y:ents.filter(e=>e.platform===p&&e.entry_date===d).reduce((s,e)=>s+mktN(e[metric]),0)}))}));
  return {xl:dates.map(d=>mktWeekShort(mktWeekKey(d))), series};
}
/* ---- Social Followers & Views Dashboard (the one centralized weekly report) ----
   Metric toggle picks Followers OR Views. KPIs + a WoW trend line per platform,
   then ONE grouped comparison per platform (all that platform's accounts together). */
function mktTabSocialDash(){
  const ents=mktFiltered(); if(!ents.length) return mktEmpty("No followers/views data yet. Enter numbers in the Followers Table / Views Table — they feed this dashboard automatically.");
  const M=mktMetricMeta(), metric=M.k, noun=metric==='followers'?'Followers/Subs':'Views';
  const lat=mktLatestPerAccount(ents);
  const calc=lat.map(e=>({name:e.account_name,brand:e.brand,platform:e.platform,m:mktMetric(e,metric)}));
  const sum=fn=>calc.reduce((s,c)=>{const v=fn(c);return s+(v==null?0:v);},0);
  const avg=fn=>{const xs=calc.map(fn).filter(v=>v!=null);return xs.length?xs.reduce((s,v)=>s+v,0)/xs.length:null;};
  const ranked=calc.filter(c=>c.m.wowGrowth!=null||c.m.wowChange!=null).map(c=>({...c,key:c.m.wowGrowth!=null?c.m.wowGrowth:(c.m.wowChange||0)}));
  const hi=ranked.slice().sort((a,b)=>b.key-a.key)[0], lo=ranked.slice().sort((a,b)=>a.key-b.key)[0];
  const kpi=(v,l,a,s)=>`<div class="kpi"><div class="acc" style="background:${a}"></div><div class="v">${v}</div><div class="l">${l}</div>${s?`<div class="sub" style="font-size:11px;margin-top:3px;color:var(--muted2)">${esc(s)}</div>`:''}</div>`;
  const kpis=`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
    ${kpi(mktComma(sum(c=>c.m.cur)),"Total "+noun,M.color)}
    ${kpi(mktSigned(sum(c=>c.m.wowChange)),"Total WoW Change","var(--d-finance)")}
    ${kpi(mktPct(avg(c=>c.m.wowGrowth)),"Avg WoW Growth %","var(--d-finance)")}
    ${kpi(mktSigned(sum(c=>c.m.momChange)),"Total MoM Change","var(--d-sales)")}
    ${kpi(hi?esc(hi.name):'—',"Highest WoW Growth","var(--d-finance)",hi?mktPct(hi.m.wowGrowth):'')}
    ${kpi(lo?esc(lo.name):'—',"Lowest WoW Growth","var(--red)",lo?mktPct(lo.m.wowGrowth):'')}
  </div>`;
  // One WoW trend line per platform (totals), so platforms are easy to compare.
  const ps=mktPlatformWeekSeries(ents,metric);
  const trend=`<h2 style="margin:20px 0 10px">Week-over-Week ${esc(noun)} by Platform</h2>
    <div class="mkt-charts" style="grid-template-columns:1fr">${mktLineChart("Total "+noun+" per Week (one line per platform)",ps.xl,ps.series)}</div>`;
  // Per-platform grouped comparison: all accounts of a platform in ONE chart + a small WoW table.
  const platforms=mktScopePlatforms().filter(p=>calc.some(c=>c.platform===p));
  const blocks=platforms.map(p=>{
    const pc=calc.filter(c=>c.platform===p).sort((a,b)=>mktN(b.m.cur)-mktN(a.m.cur));
    const barCur=pc.map((c,i)=>({label:c.name,value:c.m.cur,color:MKT_PAL[i%MKT_PAL.length]}));
    const barWoW=pc.map(c=>({label:c.name,value:c.m.wowChange,color:c.m.wowChange>=0?'#3ec98a':'#ff5a5a'}));
    const rows=pc.map(c=>`<tr><td>${esc(c.name)}</td><td>${esc(c.brand)}</td>
      <td class="num">${mktComma(c.m.cur)}</td><td class="num">${mktComma(c.m.prevWeek)}</td>
      <td class="num ${c.m.wowChange>0?'mkt-up':c.m.wowChange<0?'mkt-down':''}">${mktSigned(c.m.wowChange)}</td>
      <td class="num">${mktPct(c.m.wowGrowth)}</td></tr>`).join("");
    return `<div class="card sect" style="margin-bottom:16px">
      <h2>${MKT_PLATFORM_ICON[p]||''} ${esc(p)} — Weekly ${esc(noun)} <span class="cnt">${pc.length} accounts</span></h2>
      <div class="mkt-charts">${mktBarChart("Current "+noun+" by account",barCur)}${mktBarChart("WoW change by account",barWoW)}</div>
      <div style="overflow-x:auto;margin-top:10px"><table class="mkt-tbl"><thead><tr><th>Account</th><th>Brand</th><th class="num">Current</th><th class="num">Prev Week</th><th class="num">WoW Δ</th><th class="num">WoW %</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
  }).join("");
  return kpis+trend+`<h2 style="margin:22px 0 12px">Platform Comparison</h2>`+blocks;
}

/* Latest entry for an account within a calendar month (the month's value). */
function mktMonthEntry(accName, platform, month){
  const list=state.mkt.entries.filter(x=>x.account_name===accName&&x.platform===platform&&mktMonthKey(x.entry_date)===month)
    .sort((a,b)=>a.entry_date.localeCompare(b.entry_date));
  return list.length?list[list.length-1]:null;
}
/* ---- Month-over-Month: editable monthly table (per platform) + MoM report ---- */
function mktTabMoM(){
  const M=mktMetricMeta(), metric=M.k, noun=metric==='followers'?'Followers/Subscribers':'Views';
  const month=state.mkt.monthSel||mktMonthKey(mktDateStr());
  const accounts=mktAccounts().filter(a=>{ const f=state.mkt.filt;
    if(f.brand && a.brand!==f.brand) return false;
    if(f.platforms&&f.platforms.length&&!f.platforms.includes(a.platform)) return false;
    if(f.account && a.name!==f.account) return false; return true; });
  const nav=`<div class="card sect" style="margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <h2 style="margin:0">${esc(M.icon)} Month-over-Month — ${esc(noun)}</h2>
    <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
      <button class="btn sm" data-mktmo="prev">‹ Prev</button>
      <b style="min-width:150px;text-align:center">${esc(mktMonthLabel(month))}</b>
      <button class="btn sm" data-mktmo="next">Next ›</button>
      <button class="btn sm" data-mktmo="this">This Month</button>
    </div></div>
    <div class="sub" style="margin:-4px 0 14px">Edit each account's <b>${esc(month===mktMonthKey(mktDateStr())?'current':'')} month-end ${esc(metric==='followers'?'followers/subs':'views')}</b> directly below — it updates the account's latest snapshot for ${esc(mktMonthLabel(month))} and feeds the MoM report. Previous-month value, MoM change and growth % are calculated automatically.</div>`;
  const platforms=mktScopePlatforms().filter(p=>accounts.some(a=>a.platform===p));
  // editable tables per platform
  const tables=platforms.map(p=>{
    const accs=accounts.filter(a=>a.platform===p);
    const rows=accs.map(a=>{
      const e=mktMonthEntry(a.name,a.platform,month);
      const stub=e||normMktEntry({entry_date:month+"-15",brand:a.brand,platform:p,account_name:a.name});
      const m=mktMetric(stub,metric);
      const curVal=e&&e[metric]!=null?e[metric]:'';
      const da=`data-mktmacc="${esc(a.name)}" data-mktmplat="${esc(p)}" data-mktmbrand="${esc(a.brand)}"`;
      return `<tr><td>${esc(a.brand)}</td><td>${esc(a.name)}</td>
        <td class="mkt-cell"><input type="number" step="any" ${da} data-mktmfield="${metric}" value="${curVal}" placeholder="—"/></td>
        <td class="num">${mktComma(m.prevMonth)}</td>
        <td class="num ${m.momChange>0?'mkt-up':m.momChange<0?'mkt-down':''}">${mktSigned(m.momChange)}</td>
        <td class="num">${mktPct(m.momGrowth)}</td></tr>`;
    }).join("");
    return `<div class="card sect" style="margin-bottom:16px"><h2>${MKT_PLATFORM_ICON[p]||''} ${esc(p)} <span class="cnt">${accs.length}</span></h2>
      <div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>Brand</th><th>Account</th><th>This Month ${esc(metric==='followers'?'Followers':'Views')}</th><th class="num">Prev Month</th><th class="num">MoM Δ</th><th class="num">MoM %</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join("");
  // MoM report: trend (total per month) + per-platform MoM change comparison
  const ents=mktFiltered();
  const byMonth=new Map(); ents.forEach(e=>{ const mk=mktMonthKey(e.entry_date); if(!mk)return; if(!byMonth.has(mk))byMonth.set(mk,new Map());
    const am=byMonth.get(mk),k=mktAcctKey(e),cur=am.get(k); if(!cur||e.entry_date>cur.entry_date) am.set(k,e); });
  const moKeys=[...byMonth.keys()].sort();
  const trend=mktLineChart("Total "+noun+" by Month (month-end)",moKeys.map(mktMonthShort),[{label:noun,color:M.color,points:moKeys.map(mk=>({y:[...byMonth.get(mk).values()].reduce((s,e)=>s+mktN(e[metric]),0)}))}]);
  // selected month's per-account MoM, grouped by platform
  const monthAccts=byMonth.has(month)?[...byMonth.get(month).values()]:[];
  const reportBlocks=platforms.map(p=>{
    const list=monthAccts.filter(e=>e.platform===p).map(e=>({name:e.account_name,m:mktMetric(e,metric)}));
    if(!list.length) return '';
    const bars=list.map((x,i)=>({label:x.name,value:x.m.momChange,color:x.m.momChange>=0?'#3ec98a':'#ff5a5a'}));
    return `<div class="card sect" style="margin-bottom:16px"><h2>${MKT_PLATFORM_ICON[p]||''} ${esc(p)} — MoM ${esc(noun)} Change <span class="cnt">${esc(mktMonthLabel(month))}</span></h2>
      <div class="mkt-charts" style="grid-template-columns:1fr">${mktBarChart("MoM change by account",bars)}</div></div>`;
  }).filter(Boolean).join("");
  return nav+(tables||mktEmpty("No accounts match the filter."))
    +`<h2 style="margin:22px 0 12px">📈 Month-over-Month Report</h2>
      <div class="mkt-charts" style="grid-template-columns:1fr;margin-bottom:16px">${trend}</div>
      ${reportBlocks||'<div class="card sect"><div class="empty">Add a second month of data to see month-over-month comparisons.</div></div>'}`;
}

    if(f.from && c.date && c.date<f.from) return false;
    if(f.to && c.date && c.date>f.to) return false;
    if(f.brand && c.brand!==f.brand) return false;

function bindMarketing(c){
  if(!state.mkt.loaded && !state.mkt.loading){ loadMarketing().then(()=>{ if(state.view==="marketing") renderContent(); }); return; }
  c.querySelectorAll("[data-mkttab]").forEach(el=>el.onclick=()=>{ state.mkt.tab=el.dataset.mkttab; state.mkt.taskDash=null; renderContent(); });
  c.querySelectorAll("[data-mktmetric]").forEach(el=>el.onclick=()=>{ state.mkt.metric=el.dataset.mktmetric; renderContent(); });
  c.querySelectorAll("[data-mktf]").forEach(el=>el.onchange=()=>{ state.mkt.filt[el.dataset.mktf]=el.value; renderContent(); });
  c.querySelectorAll("[data-mktplat]").forEach(el=>el.onclick=()=>{ const p=el.dataset.mktplat, arr=state.mkt.filt.platforms||(state.mkt.filt.platforms=[]); const i=arr.indexOf(p); if(i>=0)arr.splice(i,1); else arr.push(p); renderContent(); });
  const clr=c.querySelector("[data-mktclear]"); if(clr) clr.onclick=()=>{ state.mkt.filt={from:"",to:"",brand:"",platforms:[],account:"",week:"",month:"",owner:"",status:""}; state.mkt.taskDash=null; renderContent(); };
  // task dashboard cards
  c.querySelectorAll("[data-mkttdash]").forEach(el=>el.onclick=()=>{ const k=el.dataset.mkttdash; state.mkt.taskDash = state.mkt.taskDash===k?null:k; renderContent(); });
  const nt=$("#mktNewTask"); if(nt) nt.onclick=openMarketingTaskModal;
  // editable table week nav
  c.querySelectorAll("[data-mktwk]").forEach(el=>el.onclick=()=>{ const w=state.mkt.weekSel||mktThisWeek();
    if(el.dataset.mktwk==="prev") state.mkt.weekSel=mktAddDays(w,-7);
    else if(el.dataset.mktwk==="next") state.mkt.weekSel=mktAddDays(w,7);
    else state.mkt.weekSel=mktThisWeek(); renderContent(); });
  // editable cells
  c.querySelectorAll("input[data-mktfield]").forEach(el=>el.onchange=async()=>{
    if(!isAdmin()){ toast("Only Sammy or Rob can edit"); renderContent(); return; }
    const week=state.mkt.weekSel||mktThisWeek();
    const accName=el.dataset.mktacc, platform=el.dataset.mktplat2, brand=el.dataset.mktbrand, field=el.dataset.mktfield, val=el.value.trim();
    let e=state.mkt.entries.find(x=>x.account_name===accName&&x.platform===platform&&mktWeekKey(x.entry_date)===week);
    if(!e){ if(val==="" ) return;
      e=normMktEntry({id:"mk_"+week+"_"+mktSlug(platform)+"_"+mktSlug(accName), entry_date:week, week_start:week, week_end:mktAddDays(week,6), brand, platform, account_name:accName, source:"Manual"});
      state.mkt.entries.push(e);
    }
    if(field==="notes") e.notes=val; else e[field]=(val===""||isNaN(+val))?null:+val;
    e.entry_date=week; e.week_start=week; e.week_end=mktAddDays(week,6);
    try{ await mktSaveEntry(e); toast("Saved"); }catch(err){}
    renderContent();
  });
  // Month-over-Month table: month nav + editable month-end cells
  c.querySelectorAll("[data-mktmo]").forEach(el=>el.onclick=()=>{ const m=state.mkt.monthSel||mktMonthKey(mktDateStr());
    const shift=n=>{ const d=new Date(m+"-15T00:00:00"); d.setMonth(d.getMonth()+n); return mktMonthKey(mktDateStr(d)); };
    if(el.dataset.mktmo==="prev") state.mkt.monthSel=shift(-1);
    else if(el.dataset.mktmo==="next") state.mkt.monthSel=shift(1);
    else state.mkt.monthSel=mktMonthKey(mktDateStr()); renderContent(); });
  c.querySelectorAll("input[data-mktmfield]").forEach(el=>el.onchange=async()=>{
    if(!isAdmin()){ toast("Only Sammy or Rob can edit"); renderContent(); return; }
    const month=state.mkt.monthSel||mktMonthKey(mktDateStr());
    const accName=el.dataset.mktmacc, platform=el.dataset.mktmplat, brand=el.dataset.mktmbrand, field=el.dataset.mktmfield, val=el.value.trim();
    let e=mktMonthEntry(accName,platform,month);   // update the month's latest snapshot, or create one
    if(!e){ if(val==="") return;
      e=normMktEntry({id:"mm_"+month+"_"+mktSlug(platform)+"_"+mktSlug(accName), entry_date:month+"-15", week_start:mktWeekKey(month+"-15"), brand, platform, account_name:accName, source:"Manual"});
      state.mkt.entries.push(e);
    }
    e[field]=(val===""||isNaN(+val))?null:+val;
    try{ await mktSaveEntry(e); toast("Saved"); }catch(err){}
    renderContent();
  });
  // content calendar
  const ac=$("#mktAddContent"); if(ac) ac.onclick=()=>openMktContentModal();
  c.querySelectorAll("[data-mktcedit]").forEach(el=>el.onclick=()=>openMktContentModal(el.dataset.mktcedit));
  c.querySelectorAll("[data-mktcdel]").forEach(el=>el.onclick=async()=>{ if(!requireAdmin())return; if(!confirm("Delete this content item?"))return; await mktDeleteContent(el.dataset.mktcdel); toast("Deleted"); renderContent(); });
  c.querySelectorAll("[data-mktcatt]").forEach(el=>el.onclick=(ev)=>{ ev.preventDefault(); openMktContentAttach(el.dataset.mktcatt); });
  // settings accounts
  const aa=$("#mktAddAcct"); if(aa) aa.onclick=async()=>{ if(!requireAdmin())return; const name=$("#mktNewName").value.trim(); if(!name){ toast("Enter an account name"); return; }
    const brand=$("#mktNewBrand").value.trim(), platform=$("#mktNewPlatform").value;
    if(mktAccounts().some(x=>x.name===name&&x.platform===platform)){ toast("That account already exists"); return; }
    state.mkt.accounts.push({brand,platform,name}); await mktSaveAccounts(); toast("Account added"); renderContent(); };
  c.querySelectorAll("[data-mktaccdel]").forEach(el=>el.onclick=async()=>{ if(!requireAdmin())return; const i=el.dataset.mktaccdel.indexOf("|"); const platform=el.dataset.mktaccdel.slice(0,i), name=el.dataset.mktaccdel.slice(i+1);
    state.mkt.accounts=state.mkt.accounts.filter(a=>!(a.platform===platform&&a.name===name)); await mktSaveAccounts(); toast("Account removed"); renderContent(); });
  // reuse the main task board's row interactions (open drawer, status, attach, edit, delete)
  bindBoard(c);
}

/* ---- Calendar -------------------------------------------------------------- */
/* The calendar mirrors the active task board: only ACTIVE tasks (not completed/
   archived) are shown, placed by START date & time. Views: Today / This Week /
   This Month, with Prev/Next/Today navigation. */
function localKey(dt){ return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function weekStart(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); x.setHours(0,0,0,0); return x; }
function calTitle(view, ref){
  if(view==="today") return ref.toLocaleDateString(undefined,{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  if(view==="week"){ const s=weekStart(ref), e=new Date(weekStart(ref)); e.setDate(s.getDate()+6);
    return s.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' – '+e.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
  return ref.toLocaleDateString(undefined,{month:'long',year:'numeric'});
}
/* Calendar pill: just the task name, highlighted by department. Clicking it
   routes to the Tasks Board and opens the task to complete/update. */
function calPill(t){
  return `<div class="calpill dept-pill" data-goto="${t.id}" title="${esc(t.name)} · ${esc(t.department)}" style="background:${DEPT_COLOR[t.department]};color:#10131a">
    <span style="overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</span>
  </div>`;
}
function viewCalendar(){
  const view = state.calView || "month";
  const ref = state.calRef;
  const todayK = todayStr();
  // Active tasks only (mirrors the board), placed by START date.
  const tasksByDay={};
  state.tasks.filter(isActive).forEach(t=>{ if(!t.startDate) return; (tasksByDay[t.startDate]=tasksByDay[t.startDate]||[]).push(t); });
  Object.values(tasksByDay).forEach(arr=>arr.sort((a,b)=>(a.startTime||"")>(b.startTime||"")?1:-1));

  const cellHtml=(date,out,big)=>{
    const k=localKey(date); const list=tasksByDay[k]||[];
    const limit = big?8:3;
    const pills=list.slice(0,limit).map(calPill).join("");
    const more=list.length>limit?`<div class="more">+${list.length-limit} more</div>`:'';
    return `<div class="cell ${out?'out':''} ${k===todayK?'today':''} ${big?'big':''}" data-day="${k}">
      <div class="dnum">${date.getDate()}</div>${pills}${more}</div>`;
  };
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const mobile=isMobile();

  // Stacked day-list (used on phones for Week/Month, and always for Today).
  const dayList=(dates, skipEmpty)=>dates.map(d=>{
    const k=localKey(d); const list=tasksByDay[k]||[];
    if(skipEmpty && !list.length) return "";
    return `<div class="cal-daysec ${k===todayK?'today':''}" data-day="${k}">
      <div class="cal-dayhd">${d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}<span class="cnt">${list.length||''}</span></div>
      ${list.length?`<div style="display:flex;flex-direction:column;gap:6px">${list.map(calPill).join("")}</div>`:'<div class="sub" style="color:var(--muted2)">No tasks</div>'}
    </div>`;
  }).join("");

  let body="";
  if(view==="today"){
    const k=localKey(ref); const list=tasksByDay[k]||[];
    body=`<div class="card sect">
      <h2>${ref.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})} <span class="cnt">${list.length}</span></h2>
      ${list.length?`<div style="display:flex;flex-direction:column;gap:6px">${list.map(calPill).join("")}</div>`:'<div class="empty">No active tasks starting on this day.</div>'}
    </div>`;
  } else if(view==="week"){
    const monday=weekStart(ref); const cells=[];
    for(let i=0;i<7;i++){ const d=new Date(monday); d.setDate(monday.getDate()+i); cells.push(d); }
    body = mobile
      ? `<div class="cal-list">${dayList(cells,false)}</div>`
      : `<div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells.map(d=>cellHtml(d,false,true)).join("")}</div>`;
  } else { // month
    const y=ref.getFullYear(), m=ref.getMonth();
    const daysInMonth=new Date(y,m+1,0).getDate();
    if(mobile){
      const days=[]; for(let d=1;d<=daysInMonth;d++) days.push(new Date(y,m,d));
      const html=dayList(days,true);
      body=`<div class="cal-list">${html||'<div class="empty">No active tasks starting this month.</div>'}</div>`;
    } else {
      const first=new Date(y,m,1); const startDow=(first.getDay()+6)%7;
      const cells=[];
      for(let i=0;i<startDow;i++){ const d=new Date(y,m,1-(startDow-i)); cells.push({date:d,out:true}); }
      for(let d=1;d<=daysInMonth;d++) cells.push({date:new Date(y,m,d),out:false});
      while(cells.length%7!==0){ const last=cells[cells.length-1].date; cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),out:true}); }
      body=`<div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells.map(c=>cellHtml(c.date,c.out,false)).join("")}</div>`;
    }
  }

  const vbtn=(v,l)=>`<button class="chip ${view===v?'active':''}" data-calview="${v}">${l}</button>`;
  return `<div class="page-head"><div><h1>Calendar</h1><div class="sub">Active tasks, by start date &amp; time</div></div></div>
    <div class="calbar">
      <div class="calviews">${vbtn("today","Today")}${vbtn("week","This Week")}${vbtn("month","This Month")}</div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <button class="btn sm" id="calPrev">‹ Prev</button>
        <h2>${calTitle(view,ref)}</h2>
        <button class="btn sm" id="calNext">Next ›</button>
        <button class="btn sm" id="calToday">Today</button>
      </div>
    </div>
    ${body}`;
}
function bindCalendar(c){
  c.querySelectorAll("[data-calview]").forEach(el=>el.onclick=()=>{ state.calView=el.dataset.calview; renderContent(); });
  const step=(dir)=>{
    const view=state.calView||"month"; const d=new Date(state.calRef);
    if(view==="today") d.setDate(d.getDate()+dir);
    else if(view==="week") d.setDate(d.getDate()+7*dir);
    else d.setMonth(d.getMonth()+dir);
    state.calRef=d; renderContent();
  };
  const p=$("#calPrev"); if(p) p.onclick=()=>step(-1);
  const n=$("#calNext"); if(n) n.onclick=()=>step(1);
  const t=$("#calToday"); if(t) t.onclick=()=>{ state.calRef=new Date(); renderContent(); };
  c.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{ state.drawer={type:"day",date:el.dataset.day}; renderDrawer(); });
  // Click a task pill: route to the Tasks Board and open the task to complete/update.
  c.querySelectorAll("[data-goto]").forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    state.view="board"; state.drawer={type:"task", id:el.dataset.goto}; render();
  });
}

function bindSettings(c){

    saveConfig(); await connect(); await loadTasks(); toast(state.mode==='live'?"Connected to Supabase":"Could not connect — demo mode"); render();
  };
  $("#saveGc").onclick=async()=>{

  $("#testGc").onclick=async()=>{

    try{
      const r=await emailRequest({to:me.email,cc:"",kind:"Test Notification",event:"test",task:fields});

  c.querySelectorAll("[data-team]").forEach(el=>el.onchange=()=>{ if(!isAdmin()){ renderContent(); return; } state.cfg.team[+el.dataset.i][el.dataset.team]=el.value; });
  c.querySelectorAll("[data-teamdel]").forEach(el=>el.onclick=()=>{ if(!requireAdmin()) return; state.cfg.team.splice(+el.dataset.teamdel,1); saveConfig(); renderContent(); });

function renderDrawer(){
  const root=$("#drawer-root");
  if(!state.drawer){ root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl"></div>`; return; }
  if(state.drawer.type==="task") return renderTaskDrawer();
  if(state.drawer.type==="day") return renderDayDrawer();
}
function closeDrawer(){ state.drawer=null;
  const s=$("#scrim"), d=$("#drawerEl"); if(s)s.classList.remove("show"); if(d)d.classList.remove("show");
}
function drawerShell(inner){
  const root=$("#drawer-root");
  root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl">${inner}</div>`;
  requestAnimationFrame(()=>{ $("#scrim").classList.add("show"); $("#drawerEl").classList.add("show"); });
  $("#scrim").onclick=closeDrawer;
  const x=$("#drawerClose"); if(x)x.onclick=closeDrawer;
}

        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">${deptPill(t.department)}${prPill(t.priority)}${statusPill(t.status)}</div>
        <div style="font-size:18px;font-weight:700">${esc(t.name)}</div>
        ${od?'<div class="overdue-txt" style="font-size:12px;margin-top:4px">● Overdue</div>':''}
      </div>
      <button class="x" id="drawerClose">✕</button>
    </div>
    <div class="dbody">

          ${STATUSES.map(s=>`<option ${t.status===s?'selected':''}>${esc(s)}</option>`).join("")}
        </select>
      </div>
      <div class="qa">
        ${(t.requiresApproval && t.status!=="For Approval" && !isDone(t))
          ? '<button class="btn sm" data-q="approval">🛡️ Submit for Approval</button>'
          : '<button class="btn sm" data-q="done">✓ Mark '+((t.status==="For Approval")?"Approved / Completed":"Completed")+'</button>'}
        <button class="btn sm" data-q="email">✉ Email Owner</button>
        <button class="btn sm" data-q="text">📱 Text Owner</button>

        <button class="btn sm" data-q="ask">💬 Ask for Update</button>
        <button class="btn sm" data-q="move">📅 Move Due Date</button>

      </div>

        ${meta("Manager", esc(t.manager||'—'))}
        ${meta("Department", esc(t.department))}
        ${meta("Priority", prPill(t.priority))}
        ${meta("Status", statusPill(t.status))}
        ${meta("Requires Approval", t.requiresApproval?'🛡️ Yes':'No')}
        ${meta("Cadence", isRecurring(t)?'↻ '+esc(t.cadence):esc(t.cadence||'One Off'))}
        ${meta("Start", fmtDateTime(t.startDate,t.startTime))}
        ${meta("Due", `<span class="${od?'overdue-txt':''}">${fmtDateTime(t.dueDate,t.dueTime)}</span>`)}
        ${meta("Last Update", t.lastUpdate?fmtFull(t.lastUpdate):'—')}
      </div>

      ${(t.requiresApproval && t.status==="For Approval")?`<div class="banner" style="border-color:#5a4d1f;background:#1f1c10;color:#e7cf6b;margin-bottom:18px">⏳ Awaiting manager approval${t.manager?' by '+esc(t.manager):''}. The manager marks this Approved / Done.</div>`:''}

      <div class="dsec">

      <div class="dsec cmt">
        <div class="ht">Comments</div>
        ${(t.comments||[]).map(c=>`<div class="comment"><div class="ca"><b>${esc(c.author)}</b> · ${timeAgo(c.ts)}</div>${esc(c.text)}</div>`).join("")||'<div class="sub" style="color:var(--muted2)">No comments.</div>'}

  drawerShell(inner);

  const reopen=()=>{ if(state.drawer&&state.drawer.type==="task"&&state.drawer.id===t.id) renderTaskDrawer(); };

  if(dStatus) dStatus.onchange=()=>{ changeStatus(t, dStatus.value).then(reopen); };

    else if(q==="approval") submitForApproval(t).then(reopen);

  });

  if(!isAdmin()){ notes.setAttribute("readonly","readonly"); notes.style.opacity=".7"; }
  else notes.onblur=async()=>{ if((t.notes||"")!==notes.value){ t.notes=notes.value; addActivity(t,"Updated notes"); t.lastUpdate=new Date().toISOString(); await persistTask(t); } };

  $("#drawerEl").querySelectorAll("[data-attdel]").forEach(el=>el.onclick=async()=>{ t.attachments.splice(+el.dataset.attdel,1); await persistTask(t); renderTaskDrawer(); render(); });

  $("#lnkAdd").onclick=async()=>{ const u=$("#lnkUrl").value.trim(); if(!u)return; (t.links=t.links||[]).push({label:$("#lnkLabel").value.trim(),url:u}); addActivity(t,"Added a link"); await persistTask(t); renderTaskDrawer(); };
  $("#drawerEl").querySelectorAll("[data-linkdel]").forEach(el=>el.onclick=async()=>{ t.links.splice(+el.dataset.linkdel,1); await persistTask(t); renderTaskDrawer(); });

  $("#chkAdd").onclick=async()=>{ const v=$("#chkText").value.trim(); if(!v)return; (t.checklist=t.checklist||[]).push({text:v,done:false}); await persistTask(t); renderTaskDrawer(); };
  $("#drawerEl").querySelectorAll("[data-chk]").forEach(el=>el.onchange=async()=>{ t.checklist[+el.dataset.chk].done=el.checked; t.lastUpdate=new Date().toISOString(); await persistTask(t); renderTaskDrawer(); render(); });
  $("#drawerEl").querySelectorAll("[data-chkdel]").forEach(el=>el.onclick=async()=>{ t.checklist.splice(+el.dataset.chkdel,1); await persistTask(t); renderTaskDrawer(); });

  $("#cmtAdd").onclick=async()=>{ const v=$("#cmtText").value.trim(); if(!v)return; (t.comments=t.comments||[]).unshift({author:state.user||"You",text:v,ts:new Date().toISOString()}); addActivity(t,"Commented"); t.lastUpdate=new Date().toISOString(); await persistTask(t); renderTaskDrawer(); render(); };
}

/* ===========================================================================
   SPREADSHEET IMPORT (CSV file or paste from Excel/Google Sheets)
   =========================================================================== */
const IMPORT_FIELDS = {
  name:["name","task","task name","title"],
  owner:["owner","assignee","assigned to","assigned"],
  manager:["manager"],
  department:["department","dept"],
  priority:["priority"],
  status:["status"],
  startDate:["startdate","start date","start"],
  startTime:["starttime","start time"],
  dueDate:["duedate","due date","due"],
  dueTime:["duetime","due time"],
  cadence:["cadence","recurrence","repeat"],
  requiresApproval:["requiresapproval","requires approval","approval"],
  notes:["notes","note","description"],
  attachment:["attachment","file","link","attachment link","file / attachment link"]
};
const IMPORT_HEADERS = Object.keys(IMPORT_FIELDS);

function parseDelimited(text, delim){
  const rows=[]; let row=[], field="", q=false;
  text = String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===delim){ row.push(field); field=""; }
      else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function matchOne(v, list, fallback){
  const s=String(v||"").trim().toLowerCase();
  if(!s) return fallback;
  return list.find(o=>o.toLowerCase()===s) || fallback;
}
function normDate(s){
  s=String(s||"").trim(); if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){ let y=m[3]; if(y.length===2) y="20"+y; return `${y}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`; }
  const d=new Date(s); if(!isNaN(d)) return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  return s;
}
function normTime(s){
  s=String(s||"").trim(); if(!s) return "";
  let m=s.match(/^(\d{1,2}):(\d{2})\s*([ap]m)?$/i);
  if(m){ let h=+m[1]; const ap=(m[3]||"").toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":"+m[2]; }
  m=s.match(/^(\d{1,2})\s*([ap]m)$/i);
  if(m){ let h=+m[1]; const ap=m[2].toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":00"; }
  return s;
}
/* Normalize slightly-different cadence text from a spreadsheet to a valid option. */
function normCadence(s){
  const v=String(s||"").trim().toLowerCase().replace(/[\s_-]+/g,"");
  if(!v) return "One Off";
  const map={oneoff:"One Off",once:"One Off",none:"One Off",adhoc:"One Off",
    daily:"Daily",day:"Daily",everyday:"Daily",
    weekly:"Weekly",week:"Weekly",
    biweekly:"Bi-Weekly",fortnightly:"Bi-Weekly",everytwoweeks:"Bi-Weekly",
    monthly:"Monthly",month:"Monthly",
    quarterly:"Quarterly",quarter:"Quarterly",every3months:"Quarterly"};
  return map[v] || matchOne(s, CADENCES, "One Off");
}
/* Resolve the nth (1..5, or -1=last) weekday of a given month to a Date. */
function nthWeekdayOfMonth(year, month, weekday, ord){
  if(ord===-1){
    const last=new Date(year, month+1, 0);
    const d=new Date(last);
    while(d.getDay()!==weekday) d.setDate(d.getDate()-1);
    return d;
  }
  let count=0;
  for(let day=1; day<=31; day++){
    const date=new Date(year, month, day);
    if(date.getMonth()!==month) break;
    if(date.getDay()===weekday){ count++; if(count===ord) return date; }
  }
  return null;
}
/* Parse a schedule phrase (or a literal date) into an actual date.
   Returns { date:"YYYY-MM-DD"|"", ruleText:"<phrase>"|"", ok:bool }. */
function parseScheduleRule(input){
  const raw=String(input||"").trim();
  if(!raw) return {date:"", ruleText:"", ok:true};
  const s=raw.toLowerCase();
  const today=new Date(); today.setHours(0,0,0,0);
  const ds=d=>new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  const WD={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sun:0,mon:1,tue:2,tues:2,wed:3,thu:4,thur:4,thurs:4,fri:5,sat:6};
  const ORD={first:1,second:2,third:3,fourth:4,fifth:5,last:-1,"1st":1,"2nd":2,"3rd":3,"4th":4,"5th":5};

  if(s==="today") return {date:ds(today), ruleText:raw, ok:true};
  if(s==="tomorrow"){ const d=new Date(today); d.setDate(d.getDate()+1); return {date:ds(d), ruleText:raw, ok:true}; }

  // every weekday (Mon–Fri)
  if(/\bevery\s+weekday\b/.test(s) || s==="weekday"){
    const d=new Date(today); while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // every <ordinal> <weekday> of the month
  let m=s.match(/\b(first|second|third|fourth|fifth|last|1st|2nd|3rd|4th|5th)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tues?|wed|thur?s?|fri|sat)\b/);
  if(m){
    const ord=ORD[m[1]], wd=WD[m[2]];
    let d=nthWeekdayOfMonth(today.getFullYear(), today.getMonth(), wd, ord);
    if(d && d<today) d=nthWeekdayOfMonth(today.getFullYear(), today.getMonth()+1, wd, ord);
    return d ? {date:ds(d), ruleText:raw, ok:true} : {date:"", ruleText:"", ok:false};
  }
  // monthly on the Nth (e.g. "Every month on the 15th", "15th of every month")
  m=s.match(/\b(\d{1,2})(?:st|nd|rd|th)?\b/);
  if(m && /\bmonth\b/.test(s)){
    const day=+m[1]; let d=new Date(today.getFullYear(), today.getMonth(), day);
    if(d<today) d=new Date(today.getFullYear(), today.getMonth()+1, day);
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // every <weekday> / plain weekday name -> next occurrence on/after today
  m=s.match(/\b(?:every\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
  if(m){
    const wd=WD[m[1]]; const d=new Date(today); d.setDate(d.getDate()+((wd-d.getDay()+7)%7));
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // literal date (YYYY-MM-DD or M/D/YYYY) — not a rule
  const nd=normDate(raw);
  if(/^\d{4}-\d{2}-\d{2}$/.test(nd)) return {date:nd, ruleText:"", ok:true};
  return {date:"", ruleText:"", ok:false};   // unrecognized
}
function rowsToTasks(rows){
  if(!rows || !rows.length) return {tasks:[], skipped:0, error:"No rows found.", warnings:[]};
  const header = rows[0].map(h=>String(h||"").trim().toLowerCase());
  const colField={};
  header.forEach((h,idx)=>{ for(const f of IMPORT_HEADERS){ if(IMPORT_FIELDS[f].includes(h)){ colField[idx]=f; break; } } });
  if(!Object.values(colField).includes("name"))
    return {tasks:[], skipped:0, error:"No 'name' (or 'task') column found in the first row. The first row must be a header.", warnings:[]};
  const tasks=[]; let skipped=0; const warnings=[];
  for(let r=1;r<rows.length;r++){
    const cells=rows[r];
    if(!cells || cells.every(c=>!String(c||"").trim())) continue;
    const o={}; cells.forEach((v,idx)=>{ if(colField[idx]!=null) o[colField[idx]]=String(v==null?"":v).trim(); });
    if(!o.name){ skipped++; continue; }
    const t=blankTask();
    t.name=o.name;
    if(o.owner) t.owner=o.owner;
    if(o.manager) t.manager=o.manager;
    t.department=matchOne(o.department, DEPARTMENTS, "Operations");
    t.priority=matchOne(o.priority, PRIORITIES, "Normal");
    t.status=matchOne(o.status, STATUSES, "") || mapStatus(o.status);
    t.cadence=normCadence(o.cadence);
    t.requiresApproval=/^(yes|y|true|1)$/i.test(o.requiresApproval||"");
    // Smart Start/Due dates: understand schedule phrases as well as literal dates.
    const sr=parseScheduleRule(o.startDate), dr=parseScheduleRule(o.dueDate);
    if(o.startDate && !sr.ok) warnings.push(`"${o.name}": couldn't understand start date "${o.startDate}"`);
    if(o.dueDate && !dr.ok) warnings.push(`"${o.name}": couldn't understand due date "${o.dueDate}"`);
    if(sr.date) t.startDate=sr.date;
    if(dr.date) t.dueDate=dr.date;
    if(sr.ruleText) t.startRule=sr.ruleText;
    if(dr.ruleText) t.dueRule=dr.ruleText;
    const rule = sr.ruleText || dr.ruleText;
    if(rule) t.scheduleRule=rule;            // original phrase kept in the task JSON
    if(o.startTime) t.startTime=normTime(o.startTime);
    if(o.dueTime) t.dueTime=normTime(o.dueTime);
    if(o.notes) t.notes=o.notes;
    if(o.attachment) t.attachments=[{name:o.attachment, url:o.attachment, notes:""}];
    tasks.push(t);
  }
  return {tasks, skipped, error:null, warnings};
}
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadTemplate(){
  const sample=["Monthly board meeting","Lisa","Sammy","Managers","High","To Do","Every first Thursday of the month","09:00","Every first Thursday of the month","15:00","Monthly","Yes","Prep agenda",""];
  const csv=[IMPORT_HEADERS, sample].map(r=>r.map(csvCell).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="task-import-template.csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function openImportModal(){ if(!requireAdmin()) return; state.modal={type:"import", parsed:null, skipped:0, error:null, sendEmails:false}; renderModal(); }
function doParseImport(text){
  text=String(text||"").trim();
  if(!text){ state.modal.error="Nothing to parse — paste rows or choose a CSV file."; state.modal.parsed=null; renderModal(); return; }
  const firstLine=text.split("\n")[0];
  const delim = (firstLine.split("\t").length > firstLine.split(",").length) ? "\t" : ",";
  const res=rowsToTasks(parseDelimited(text, delim));
  state.modal.error=res.error; state.modal.parsed=res.error?null:res.tasks; state.modal.skipped=res.skipped||0;
  state.modal.warnings=res.warnings||[];
  renderModal();
}
async function doImport(tasks, sendEmails){
  if(!requireAdmin()) return;
  if(!tasks || !tasks.length) return;
  if(state.modal && state.modal._importing) return;   // guard against double-submit duplicates
  if(state.modal) state.modal._importing = true;
  const go=$("#importGo"); if(go){ go.disabled=true; go.textContent="Importing…"; }

  const list = tasks.slice();
  const lead = (state.cfg.reminderLeadMin||120) * 60000;
  for(const t of list){
    const n = ensureNotif(t);
    if(!sendEmails) n.assigned=true;                   // suppress assignment email unless asked
    // Suppress the reminder backlog: imported tasks already past-due / due-soon
    // must NOT blast overdue/due-soon emails. Future tasks still get one reminder.
    const d = dueDateTime(t);
    if(d){ const ms=d.getTime()-Date.now(); if(ms<=0){ n.overdue=true; n.almost=true; } else if(ms<=lead){ n.almost=true; } }
    addActivity(t, "Imported from spreadsheet");
    state.tasks.push(t);
  }
  const ok = await persistTasks(list);                 // single bulk upsert (fast, atomic-ish)
  if(sendEmails){                                       // optional: notify owners (throttled)
    for(const t of list){ if(t.owner) await notifyAssigned(t, "created"); }
    await persistTasks(list.filter(t=>t.owner));        // save the updated notif flags
  }
  closeModal();
  toast(`Imported ${list.length} task${list.length!==1?'s':''}`+(ok===false?" (save error — check connection)":""));
  render();
}
function renderImportModal(){
  const m=state.modal, root=$("#modal-root");
  const p=m.parsed;
  root.innerHTML=`
  <div class="modal show"><div class="box wide">
    <div class="mh"><h3>Import Tasks from Spreadsheet</h3><button class="x" id="modalClose">✕</button></div>
    <div class="mb">
      <div class="sub" style="margin-bottom:12px">Upload a <b>CSV file</b>, or copy cells from <b>Excel / Google Sheets</b> and paste below. The first row must be a header. Recognized columns: <code class="k">name</code> (required), owner, manager, department, priority, status, startDate, startTime, dueDate, dueTime, cadence, requiresApproval, notes, attachment.</div>
      <div class="hint" style="margin-bottom:12px">📅 <b>Smart dates:</b> Start/Due dates accept schedule phrases, not just literal dates — e.g. <code class="k">Every first Thursday of the month</code>, <code class="k">Every Monday</code>, <code class="k">Every weekday</code>, <code class="k">Every month on the 15th</code>, <code class="k">Today</code>, <code class="k">Tomorrow</code>. The app calculates the actual date and keeps the original phrase in the task.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn sm" id="dlTemplate">⬇ Download CSV template</button>
        <label class="btn sm" style="cursor:pointer">📄 Choose CSV file<input id="csvFile" type="file" accept=".csv,text/csv,text/plain" style="display:none"/></label>
      </div>
      <div class="fld"><label>…or paste rows here (copy from Excel / Google Sheets, or CSV text)</label>
        <textarea id="pasteArea" style="min-height:120px;width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:10px;font-family:monospace;font-size:12px" placeholder="name, owner, manager, department, priority, startDate, dueDate, dueTime&#10;Board meeting, Lisa, Sammy, Managers, High, Every first Thursday of the month, Every first Thursday of the month, 15:00"></textarea>
      </div>
      <div style="margin-top:8px"><button class="btn sm primary" id="parseBtn">Preview</button></div>
      ${m.error?`<div class="banner demo" style="margin-top:12px">⚠ ${esc(m.error)}</div>`:''}
      ${(m.warnings&&m.warnings.length)?`<div class="banner demo" style="margin-top:12px">⚠ <b>${m.warnings.length}</b> date rule(s) couldn't be understood — fix these in your sheet and Preview again (these tasks will import without a date):<div style="margin-top:6px;max-height:120px;overflow:auto">${m.warnings.slice(0,50).map(w=>`<div style="font-size:12px">• ${esc(w)}</div>`).join("")}</div></div>`:''}
      ${p?`<div class="banner" style="margin-top:12px">✅ Parsed <b style="margin:0 4px">${p.length}</b> task${p.length!==1?'s':''}${m.skipped?` · ${m.skipped} row(s) skipped (missing name)`:''}.
        <div style="margin-top:8px;max-height:170px;overflow:auto;width:100%">${p.slice(0,100).map(t=>`<div style="font-size:12px;padding:2px 0">• ${esc(t.name)} <span style="color:var(--muted2)">— ${esc(t.owner||'Unassigned')} · ${esc(t.department)} · start ${esc(fmtDateTime(t.startDate,t.startTime))} · due ${esc(fmtDateTime(t.dueDate,t.dueTime))}${t.scheduleRule?' · 🔁 '+esc(t.scheduleRule):''}${t.requiresApproval?' · 🛡️':''}</span></div>`).join("")}</div></div>
        <label class="check" style="margin-top:10px"><input type="checkbox" id="impEmail" ${m.sendEmails?'checked':''}/> <span>Email owners that they were assigned (off by default to avoid a burst of emails)</span></label>`:''}
    </div>
    <div class="mf"><button class="btn" id="modalCancel">Cancel</button>
      <button class="btn primary" id="importGo" ${(p&&p.length)?'':'disabled style="opacity:.5;cursor:not-allowed"'}>Import${p&&p.length?' '+p.length+' task'+(p.length!==1?'s':''):''}</button></div>
  </div></div>`;
  $("#modalClose").onclick=closeModal; $("#modalCancel").onclick=closeModal;
  $("#dlTemplate").onclick=downloadTemplate;
  $("#parseBtn").onclick=()=>doParseImport($("#pasteArea").value);
  $("#csvFile").onchange=(e)=>{ const f=e.target.files && e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>doParseImport(String(rd.result)); rd.readAsText(f); };
  const ie=$("#impEmail"); if(ie) ie.onchange=()=>{ state.modal.sendEmails=ie.checked; };
  const go=$("#importGo"); if(go && p && p.length) go.onclick=()=>doImport(p, state.modal.sendEmails);
}

(async function init(){
  loadConfig();
  render();                 // initial paint
  await connect();
  await loadTasks();
  render();
  setInterval(()=>{ notificationScan(); }, 60000);
  setInterval(()=>{ if(!state.modal && !state.drawer) render(); }, 120000);
  setTimeout(notificationScan, 4000);
  // Re-render when crossing the mobile/desktop breakpoint (calendar layout, etc.).
  let _wasMobile=isMobile(), _rz;
  window.addEventListener("resize", ()=>{ clearTimeout(_rz); _rz=setTimeout(()=>{ const now=isMobile(); if(now!==_wasMobile){ _wasMobile=now; if(!state.modal) renderContent(); } }, 200); });
})();

     create policy "anon update" on public.tasks for update using (true) with check (true);
     create policy "anon delete" on public.tasks for delete using (true);

   and notif.approval (plus the existing notif.assigned / almost / overdue flags).
