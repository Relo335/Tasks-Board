  const folByBrand=MKT_BRANDS.map((b,i)=>({label:b,value:mktSum(mktLatestPerAccount(ents.filter(e=>e.brand===b)),'followers'),color:brandCols[i%4]})).filter(d=>d.value>0);
  const viewsByBrand=MKT_BRANDS.map((b,i)=>({label:b,value:mktSum(ents.filter(e=>e.brand===b),'views'),color:brandCols[i%4]})).filter(d=>d.value>0);
  const charts=`<div class="mkt-charts" style="margin-bottom:16px">
    ${mktBarChart("Followers by Platform",folByPlat)}
    ${mktBarChart("Views by Platform",viewsByPlat)}
    ${mktBarChart("Followers by Brand",folByBrand)}
    ${mktBarChart("Views by Brand",viewsByBrand)}
  </div>`;
  // Brand Report (grouped by brand)
  const brandRows=MKT_BRANDS.filter(b=>ents.some(e=>e.brand===b)).map(b=>{
    const be=ents.filter(e=>e.brand===b), latest=mktLatestPerAccount(be);
    const fol=mktSum(latest,'followers'), chg=mktSum(be,'new_followers'), vw=mktSum(be,'views');
    const plats=[...new Set(be.map(e=>e.platform))].sort((a,b)=>MKT_PLATFORMS.indexOf(a)-MKT_PLATFORMS.indexOf(b));
    return `<tr><td>${esc(b)}</td><td class="num">${mktComma(fol)}</td>
      <td class="num ${chg>0?'mkt-up':chg<0?'mkt-down':''}">${mktSigned(chg)}</td><td class="num">${mktComma(vw)}</td>
      <td class="num">${latest.length}</td><td>${esc(plats.join(", "))}</td></tr>`;
  }).join("");
  const brandReport=`<div class="card sect" style="margin-bottom:16px"><h2>🏷️ Brand Report <span class="cnt">${MKT_BRANDS.filter(b=>ents.some(e=>e.brand===b)).length}</span></h2>
    <div class="sub" style="margin-bottom:10px">Grouped by brand · followers are the latest snapshot per account; WoW change & views summed over the selected range.</div>
    <div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>Brand</th><th class="num">Followers (latest)</th><th class="num">WoW Change</th><th class="num">Views</th><th class="num">Accounts</th><th>Platforms</th></tr></thead><tbody>${brandRows}</tbody></table></div></div>`;
  const platforms=state.mkt.filt.platform?[state.mkt.filt.platform]:MKT_PLATFORMS;
  const blocks=platforms.map(p=>{
    const pe=ents.filter(e=>e.platform===p);
    const accounts=mktLatestPerAccount(pe).sort((a,b)=>mktN(b.followers)-mktN(a.followers));
    if(!accounts.length) return `<div class="card sect" style="margin-bottom:16px"><h2>${MKT_PLATFORM_ICON[p]||''} ${esc(p)} Report</h2><div class="empty">No ${esc(p)} data in range.</div></div>`;
    const rows=accounts.map(e=>{
      const acctAll=pe.filter(x=>x.account_name===e.account_name);
      const gr=mktGrowthRate(e,acctAll), er=mktEngagementRate(e);
      const s=k=>mktSum(acctAll,k);
      return `<tr><td>${esc(e.brand)}</td><td>${esc(e.account_name)}</td>
        <td class="num">${mktComma(e.followers)}</td><td class="num ${s('new_followers')>0?'mkt-up':s('new_followers')<0?'mkt-down':''}">${mktSigned(s('new_followers'))}</td>
        <td class="num">${mktComma(s('views')||null)}</td><td class="num">${mktComma(s('reach')||null)}</td><td class="num">${mktComma(s('impressions')||null)}</td>
        <td class="num">${mktComma(s('engagement')||null)}</td><td class="num">${mktComma(s('posts_published')||null)}</td>
        <td class="${gr>0?'mkt-up':gr<0?'mkt-down':''}">${gr!=null?(gr>0?'+':'')+gr.toFixed(1)+'%':'—'}</td>
        <td>${er!=null?er.toFixed(1)+'%':'—'}</td>
        <td style="max-width:160px;white-space:normal">${esc((e.notes||'').slice(0,50))}</td></tr>`;
    }).join("");
    return `<div class="card sect" style="margin-bottom:16px"><h2>${MKT_PLATFORM_ICON[p]||''} ${esc(p)} Report <span class="cnt">${accounts.length}</span></h2>
      <div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>Brand</th><th>Account</th><th class="num">Followers</th><th class="num">WoW Change</th><th class="num">Views</th><th class="num">Reach</th><th class="num">Impr.</th><th class="num">Engmt</th><th class="num">Posts</th><th>Growth</th><th>Eng.Rate</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join("");
  return charts+brandReport+blocks;
}

/* ---- Account Reports ---- */
function mktTabAccount(){
  const accounts=mktAccounts();
  const sel=state.mkt.accountSel || (accounts[0]&&accounts[0].name) || "";
  const selOpts=accounts.map(a=>`<option value="${esc(a.name)}" ${sel===a.name?'selected':''}>${esc(a.name)} (${esc(a.platform)})</option>`).join("");
  const header=`<div class="card sect" style="margin-bottom:16px"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <h2 style="margin:0">Account Report</h2>
    <select id="mktAcctSel" class="f" style="min-width:240px">${selOpts||'<option>No accounts</option>'}</select></div></div>`;
  const ents=mktFiltered().filter(e=>e.account_name===sel).sort((a,b)=>a.entry_date.localeCompare(b.entry_date));
  if(!ents.length) return header+mktEmpty("No entries for this account in the selected range.");
  const latest=ents[ents.length-1], gr=mktGrowthRate(latest,ents);
  const kpi=(v,l,a)=>`<div class="kpi"><div class="acc" style="background:${a}"></div><div class="v">${v}</div><div class="l">${l}</div></div>`;
  const kpis=`<div class="kpis" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    ${kpi(mktComma(latest.followers),"Followers / Subs","var(--d-marketing)")}
    ${kpi(mktSigned(mktSum(ents,'new_followers')),"New (range)","var(--d-finance)")}
    ${kpi(mktComma(mktSum(ents,'views')||null),"Views","var(--d-sales)")}
    ${kpi(mktComma(mktSum(ents,'engagement')||null),"Engagement","var(--accent)")}
    ${kpi(gr!=null?(gr>0?'+':'')+gr.toFixed(1)+'%':'—',"Growth Rate","var(--d-operations)")}</div>`;
  const dates=mktDates(ents), xl=dates.map(d=>d.slice(5));
  const charts=`<div class="mkt-charts" style="margin-bottom:16px">
    ${mktLineChart("Followers / Subscribers Over Time",xl,[{label:"Followers",color:"#a06bff",points:mktPts(ents,dates,'followers')}])}
    ${mktLineChart("Views Over Time",xl,[{label:"Views",color:"#4a90e2",points:mktPts(ents,dates,'views')}])}
    ${mktLineChart("Engagement Over Time",xl,[{label:"Engagement",color:"#3ec98a",points:mktPts(ents,dates,'engagement')}])}
    ${mktLineChart("Reach & Impressions Over Time",xl,[{label:"Reach",color:"#f5c542",points:mktPts(ents,dates,'reach')},{label:"Impressions",color:"#f0588b",points:mktPts(ents,dates,'impressions')}])}
  </div>`;
  const content=`<div class="card sect"><h2>🏆 Top Content</h2>${mktContentTable(ents,'views',-1,false)}</div>`;
  const hist=`<div class="card sect" style="margin-top:16px"><h2>Notes & History</h2>
    ${ents.slice().reverse().map(e=>`<div style="border-bottom:1px solid var(--border);padding:8px 0;font-size:13px"><b>${esc(e.entry_date)}</b> — ${mktComma(e.followers)} followers${e.new_followers!=null&&e.new_followers!==0?` <span class="${e.new_followers>0?'mkt-up':'mkt-down'}">(${mktSigned(e.new_followers)})</span>`:''}${e.views!=null?` · ${mktComma(e.views)} views`:''}${e.notes?` · ${esc(e.notes)}`:''}</div>`).join("")}</div>`;
  return header+kpis+charts+content+hist;
}

/* ---- Weekly View (official Monday–Sunday reporting week) ---- */
function mktTabWeekly(){
  const ents=mktFiltered();
  if(!ents.length) return mktEmpty();
  const groups=new Map();
  ents.forEach(e=>{ const k=mktWeekKey(e.entry_date); if(!k) return; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(e); });
  const keys=[...groups.keys()].sort();
  const xl=keys.map(k=>mktWeekShort(k));
  const charts=`<div class="mkt-charts" style="margin-bottom:16px">
    ${mktLineChart("Total Followers by Week",xl,[{label:"Followers",color:"#a06bff",points:keys.map(k=>({y:mktSum(groups.get(k),'followers')}))}])}
    ${mktLineChart("Net Follower Change by Week",xl,[{label:"WoW Change",color:"#3ec98a",points:keys.map(k=>({y:mktSum(groups.get(k),'new_followers')}))}])}
    ${mktLineChart("Total Views by Week",xl,[{label:"Views",color:"#4a90e2",points:keys.map(k=>({y:mktSum(groups.get(k),'views')}))}])}
    ${mktBarChart("Views by Week",keys.map(k=>({label:mktWeekShort(k),value:mktSum(groups.get(k),'views'),color:'#4a90e2'})))}
  </div>`;
  // Best & worst WoW growth across the visible range (report #6)
  const changedAll=ents.filter(e=>e.new_followers!=null);
  const bwRow=(e,cls)=>`<tr><td>${esc(mktWeekShort(mktWeekKey(e.entry_date)))}</td><td>${esc(e.brand)}</td><td>${MKT_PLATFORM_ICON[e.platform]||''} ${esc(e.platform)}</td><td class="num ${cls}">${mktSigned(e.new_followers)}</td><td class="num">${mktGrowthPct(e.followers,e.new_followers)}</td></tr>`;
  const gains=changedAll.slice().sort((a,b)=>b.new_followers-a.new_followers).slice(0,5);
  const losses=changedAll.slice().sort((a,b)=>a.new_followers-b.new_followers).slice(0,5);
  const bestWorst=changedAll.length?`<div class="grid2" style="margin-bottom:16px">
    <div class="card sect"><h2>🏆 Best Growth — Top WoW Gains</h2><div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>Week</th><th>Brand</th><th>Platform</th><th class="num">WoW Change</th><th class="num">Growth %</th></tr></thead><tbody>${gains.map(e=>bwRow(e,'mkt-up')).join("")}</tbody></table></div></div>
    <div class="card sect"><h2>📉 Worst Growth — Largest WoW Losses</h2><div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>Week</th><th>Brand</th><th>Platform</th><th class="num">WoW Change</th><th class="num">Growth %</th></tr></thead><tbody>${losses.map(e=>bwRow(e,'mkt-down')).join("")}</tbody></table></div></div>
  </div>`:'';
  // Per-week detail blocks (newest first)
  const blocks=keys.slice().reverse().map(monday=>{
    const g=groups.get(monday).slice().sort((a,b)=> a.platform===b.platform ? a.brand.localeCompare(b.brand) : MKT_PLATFORMS.indexOf(a.platform)-MKT_PLATFORMS.indexOf(b.platform));
    const totCur=mktSum(g,'followers'), totChg=mktSum(g,'new_followers'), totVw=mktSum(g,'views');
    const changed=g.filter(e=>e.new_followers!=null);
    const best=changed.slice().sort((a,b)=>b.new_followers-a.new_followers)[0];
    const worst=changed.slice().sort((a,b)=>a.new_followers-b.new_followers)[0];
    const rows=g.map(e=>{
      const prevE=mktPrevWeekEntry(e);
      const prev = prevE ? prevE.followers : (e.followers!=null&&e.new_followers!=null ? e.followers-e.new_followers : null);
      return `<tr><td>${esc(e.brand)}</td><td>${MKT_PLATFORM_ICON[e.platform]||''} ${esc(e.platform)}</td>
        <td class="num">${mktComma(e.followers)}</td><td class="num">${mktComma(prev)}</td>
        <td class="num ${e.new_followers>0?'mkt-up':e.new_followers<0?'mkt-down':''}">${mktSigned(e.new_followers)}</td>
        <td class="num">${mktGrowthPct(e.followers,e.new_followers)}</td>
        <td class="num">${mktComma(e.views)}</td></tr>`;
    }).join("");
    const bw = (best&&worst)?`<div class="sub" style="margin-top:8px">🏆 Best: <b>${esc(best.brand)} · ${esc(best.platform)}</b> ${mktSigned(best.new_followers)} &nbsp;·&nbsp; 📉 Worst: <b>${esc(worst.brand)} · ${esc(worst.platform)}</b> ${mktSigned(worst.new_followers)}</div>`:'';
    return `<div class="card sect" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:baseline">
        <h2 style="margin:0">${esc(mktWeekLabel(monday))}</h2>
        <div class="sub">Mon–Sun · ${g.length} accounts · Net ${mktSigned(totChg)} followers · ${mktComma(totVw)} views</div>
      </div>
      <div style="overflow-x:auto;margin-top:10px"><table class="mkt-tbl">
        <thead><tr><th>Brand</th><th>Platform</th><th class="num">Current Followers</th><th class="num">Previous Week</th><th class="num">WoW Change</th><th class="num">WoW Growth %</th><th class="num">Views</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="font-weight:700;border-top:2px solid var(--border)"><td colspan="2">Total</td><td class="num">${mktComma(totCur)}</td><td class="num">—</td><td class="num ${totChg>0?'mkt-up':totChg<0?'mkt-down':''}">${mktSigned(totChg)}</td><td class="num">—</td><td class="num">${mktComma(totVw)}</td></tr></tfoot>
      </table></div>${bw}
    </div>`;
  }).join("");
  return charts+bestWorst+blocks;
}

/* ---- Monthly view ---- */
function mktTabPeriod(kind){
  const ents=mktFiltered();
  if(!ents.length) return mktEmpty();
  const keyFn = kind==="week"?(e=>mktWeekKey(e.entry_date)):(e=>mktMonthKey(e.entry_date));
  const labelFn = kind==="week"?(k=>"Week of "+k):(k=>k);
  const groups=new Map();
  ents.forEach(e=>{ const k=keyFn(e); if(!k) return; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(e); });
  const keys=[...groups.keys()].sort();
  const rows=keys.slice().reverse().map(k=>{
    const g=groups.get(k), s=key=>mktSum(g,key);
    const bestP=[...mktGroupSum(g,e=>e.platform,'engagement').entries()].sort((a,b)=>b[1]-a[1])[0];
    const bestB=[...mktGroupSum(g,e=>e.brand,'engagement').entries()].sort((a,b)=>b[1]-a[1])[0];
    const top=g.slice().sort((a,b)=>mktN(b.views)-mktN(a.views))[0];
    return `<tr><td>${esc(labelFn(k))}</td>
      <td class="num ${s('new_followers')>0?'mkt-up':s('new_followers')<0?'mkt-down':''}">${mktSigned(s('new_followers'))}</td><td class="num">${mktComma(s('views')||null)}</td>
      <td class="num">${mktComma(s('reach')||null)}</td><td class="num">${mktComma(s('impressions')||null)}</td>
      <td class="num">${mktComma(s('engagement')||null)}</td><td class="num">${mktComma(s('posts_published')||null)}</td>
      <td>${bestP?esc(bestP[0]):'—'}</td><td>${bestB?esc(bestB[0]):'—'}</td>
      <td style="max-width:200px;white-space:normal">${top?esc((top.top_post_title||top.account_name||'—').slice(0,40)):'—'}</td></tr>`;
  }).join("");
  const xl=keys.map(k=>kind==='week'?k.slice(5):k);
  const engSeries=keys.map(k=>mktSum(groups.get(k),'engagement'));
  const folSeries=keys.map(k=>mktSum(groups.get(k),'new_followers'));
  const viewSeries=keys.map(k=>mktSum(groups.get(k),'views'));
  const chart=`<div class="mkt-charts" style="margin-bottom:16px">
    ${mktLineChart((kind==='week'?'Weekly':'Monthly')+" Followers Gained",xl,[{label:"New Followers",color:"#a06bff",points:folSeries.map(y=>({y}))}])}
    ${mktLineChart((kind==='week'?'Weekly':'Monthly')+" Engagement Trend",xl,[{label:"Engagement",color:"#3ec98a",points:engSeries.map(y=>({y}))}])}
    ${mktLineChart((kind==='week'?'Weekly':'Monthly')+" Views Trend",xl,[{label:"Views",color:"#4a90e2",points:viewSeries.map(y=>({y}))}])}
  </div>`;
  return chart+`<div class="card sect"><h2>${kind==='week'?'Weekly':'Monthly'} View <span class="cnt">${keys.length}</span></h2>
    <div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr><th>${kind==='week'?'Week':'Month'}</th><th class="num">Followers Gained</th><th class="num">Views</th><th class="num">Reach</th><th class="num">Impr.</th><th class="num">Engmt</th><th class="num">Posts</th><th>Best Platform</th><th>Best Brand</th><th>Top Content</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

/* ---- Top Content ---- */
function mktTabContent(){
  const ents=mktFiltered().filter(e=>e.top_post_title||e.top_post_link||mktN(e.views)>0||mktTotalEngagement(e)>0);
  const s=state.mkt.sort;
  return `<div class="card sect"><h2>🏆 Top Content <span class="cnt">${ents.length}</span></h2>
    <div class="sub" style="margin-bottom:12px">Best-performing posts/videos from your manual entries. Click a column header to sort.</div>
    ${mktContentTable(ents, s.key, s.dir, true)}</div>`;
}
function mktContentTable(ents, sortKey, dir, sortable){
  dir=dir||-1;
  const val=(e,k)=> k==='engagement'?mktTotalEngagement(e) : k==='date'?e.entry_date : mktN(e[k]);
  const rows=ents.slice().sort((a,b)=>{ const av=val(a,sortKey),bv=val(b,sortKey); return (av<bv?-1:av>bv?1:0)*dir; }).slice(0,60).map(e=>`<tr>
    <td>${esc(e.entry_date)}</td><td>${esc(e.brand)}</td><td>${MKT_PLATFORM_ICON[e.platform]||''} ${esc(e.platform)}</td><td>${esc(e.account_name)}</td>
    <td style="max-width:240px;white-space:normal">${esc((e.top_post_title||'').slice(0,80))||'—'}</td>
    <td>${e.top_post_link?`<a href="${esc(e.top_post_link)}" target="_blank" rel="noreferrer">open</a>`:'—'}</td>
    <td class="num">${mktComma(e.views)}</td><td class="num">${mktComma(e.likes)}</td><td class="num">${mktComma(e.comments)}</td>
    <td class="num">${mktComma(e.shares)}</td><td class="num">${mktComma(e.saves)}</td><td class="num">${mktComma(mktTotalEngagement(e)||null)}</td>
    <td style="max-width:160px;white-space:normal">${esc((e.notes||'').slice(0,50))}</td></tr>`).join("");
  const th=(k,l,cls)=> sortable?`<th class="sortable ${cls||''}" data-mktsort="${k}">${l}${sortKey===k?(dir<0?' ▼':' ▲'):''}</th>`:`<th class="${cls||''}">${l}</th>`;
  return ents.length?`<div style="overflow-x:auto"><table class="mkt-tbl"><thead><tr>
    ${th('date','Date')}<th>Brand</th><th>Platform</th><th>Account</th><th>Top Post</th><th>Link</th>
    ${th('views','Views','num')}${th('likes','Likes','num')}${th('comments','Comments','num')}${th('shares','Shares','num')}${th('saves','Saves','num')}${th('engagement','Engmt','num')}<th>Notes</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">No content entries yet.</div>';
}

      <div class="fld"><label>Brand</label><select id="mktNewBrand">${MKT_BRANDS.map(b=>`<option>${esc(b)}</option>`).join("")}</select></div>
      <div class="fld"><label>Platform</label><select id="mktNewPlatform">${MKT_PLATFORMS.map(p=>`<option>${esc(p)}</option>`).join("")}</select></div>

      :'<div class="hint" style="margin-top:10px">Viewer mode — only admins can add accounts.</div>'}

/* ---- Bindings ---- */
function bindMarketing(c){
  if(!state.mkt.loaded && !state.mkt.loading){ loadMarketing().then(()=>{ if(state.view==="marketing") renderContent(); }); return; }
  c.querySelectorAll("[data-mkttab]").forEach(el=>el.onclick=()=>{ state.mkt.tab=el.dataset.mkttab; renderContent(); });
  c.querySelectorAll("[data-mktf]").forEach(el=>el.onchange=()=>{ state.mkt.filt[el.dataset.mktf]=el.value; renderContent(); });
  c.querySelectorAll("[data-mktquick]").forEach(el=>el.onclick=()=>{

        Required: <b>date, brand, platform, account</b>. Everything else is optional. <code class="k">subscribers</code>/<code class="k">new_subscribers</code> are accepted as aliases. Rows save with source “Manual / CSV”.</div>
      <input type="file" id="mk_file" accept=".csv,text/csv"/>
      ${md.error?`<div class="banner demo" style="margin-top:12px">⚠ ${esc(md.error)}</div>`:''}
      ${md.parsed?`<div class="hint" style="margin-top:12px">✓ Parsed <b>${md.parsed.length}</b> entries ready to import.</div>`:''}
    </div>
    <div class="mf"><button class="btn" id="modalCancel">Cancel</button><button class="btn primary" id="mk_import" ${md.parsed&&md.parsed.length?'':'disabled'}>Import ${md.parsed?md.parsed.length:0} rows</button></div>
  </div></div>`;
  $("#modalClose").onclick=closeModal; $("#modalCancel").onclick=closeModal;
  $("#mk_file").onchange=ev=>{ const file=ev.target.files[0]; if(!file) return; const rd=new FileReader();
    rd.onload=()=>{ try{ md.parsed=parseMktCsv(String(rd.result)); md.error=md.parsed.length?null:"No valid rows found."; }
      catch(err){ md.parsed=null; md.error=String(err.message||err); } renderModal(); };
    rd.readAsText(file); };
  $("#mk_import").onclick=async()=>{ if(!md.parsed||!md.parsed.length)return; try{ await mktSaveEntries(md.parsed); }catch(e){ return; }
    await loadMarketing(); closeModal(); toast("Imported "+md.parsed.length+" entries"); renderContent(); };

function parseMktCsv(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  if(lines.length<2) throw new Error("CSV needs a header row and at least one data row.");
  const split=l=>{ const out=[];let cur="",q=false; for(let i=0;i<l.length;i++){const ch=l[i];
    if(ch==='"'){ if(q&&l[i+1]==='"'){cur+='"';i++;} else q=!q; } else if(ch===','&&!q){out.push(cur);cur="";} else cur+=ch;} out.push(cur); return out.map(s=>s.trim()); };
  const head=split(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,"_"));
  const at=n=>head.indexOf(n);
  const accIdx = at("account")>=0?at("account"):at("account_name");
  if(at("date")<0||at("brand")<0||at("platform")<0||accIdx<0) throw new Error("CSV must include date, brand, platform and account columns.");
  const get=(cols,name)=>{ const i=at(name); return i>=0?(cols[i]||""):""; };
  const rows=[];
  for(let r=1;r<lines.length;r++){
    const cols=split(lines[r]); if(cols.every(c=>!c)) continue;
    const acct=cols[accIdx]||""; if(!acct) continue;
    const o={ id:uid(), entry_date:(get(cols,"date")||mktDateStr()).slice(0,10), brand:get(cols,"brand"), platform:get(cols,"platform"), account_name:acct,
      top_post_title:get(cols,"top_post_title")||get(cols,"caption")||get(cols,"title"),
      top_post_link:get(cols,"top_post_link")||get(cols,"link")||get(cols,"post_link"),
      notes:get(cols,"notes"), source:get(cols,"source")||"Manual / CSV" };
    MKT_NUM_FIELDS.forEach(f=>{ let v=get(cols,f.k);
      if(f.k==="followers"&&v==="") v=get(cols,"subscribers");
      if(f.k==="new_followers"&&v==="") v=get(cols,"new_subscribers");
      o[f.k]=mktN(v); });
    rows.push(normMktEntry(o));
  }
  return rows;
}

/* ---- Calendar -------------------------------------------------------------- */
/* The calendar mirrors the active task board: only ACTIVE tasks (not completed/
   archived) are shown, placed by START date & time. Views: Today / This Week /
   This Month, with Prev/Next/Today navigation. */
function localKey(dt){ return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function weekStart(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); x.setHours(0,0,0,0); return x; }
function calTitle(view, ref){
  if(view==="today") return ref.toLocaleDateString(undefined,{weekday:'short',month:'long',day:'numeric',year:'numeric'});
  if(view==="week"){ const s=weekStart(ref), e=new Date(weekStart(ref)); e.setDate(s.getDate()+6);
    return s.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' – '+e.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
  return ref.toLocaleDateString(undefined,{month:'long',year:'numeric'});
}
/* Calendar pill: just the task name, highlighted by department. Clicking it
   routes to the Tasks Board and opens the task to complete/update. */
function calPill(t){
  return `<div class="calpill dept-pill" data-goto="${t.id}" title="${esc(t.name)} · ${esc(t.department)}" style="background:${DEPT_COLOR[t.department]};color:#10131a">
    <span style="overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</span>
  </div>`;
}
function viewCalendar(){
  const view = state.calView || "month";
  const ref = state.calRef;
  const todayK = todayStr();
  // Active tasks only (mirrors the board), placed by START date.
  const tasksByDay={};
  state.tasks.filter(isActive).forEach(t=>{ if(!t.startDate) return; (tasksByDay[t.startDate]=tasksByDay[t.startDate]||[]).push(t); });
  Object.values(tasksByDay).forEach(arr=>arr.sort((a,b)=>(a.startTime||"")>(b.startTime||"")?1:-1));

  const cellHtml=(date,out,big)=>{
    const k=localKey(date); const list=tasksByDay[k]||[];
    const limit = big?8:3;
    const pills=list.slice(0,limit).map(calPill).join("");
    const more=list.length>limit?`<div class="more">+${list.length-limit} more</div>`:'';
    return `<div class="cell ${out?'out':''} ${k===todayK?'today':''} ${big?'big':''}" data-day="${k}">
      <div class="dnum">${date.getDate()}</div>${pills}${more}</div>`;
  };
  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const mobile=isMobile();

  // Stacked day-list (used on phones for Week/Month, and always for Today).
  const dayList=(dates, skipEmpty)=>dates.map(d=>{
    const k=localKey(d); const list=tasksByDay[k]||[];
    if(skipEmpty && !list.length) return "";
    return `<div class="cal-daysec ${k===todayK?'today':''}" data-day="${k}">
      <div class="cal-dayhd">${d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}<span class="cnt">${list.length||''}</span></div>
      ${list.length?`<div style="display:flex;flex-direction:column;gap:6px">${list.map(calPill).join("")}</div>`:'<div class="sub" style="color:var(--muted2)">No tasks</div>'}
    </div>`;
  }).join("");

  let body="";
  if(view==="today"){
    const k=localKey(ref); const list=tasksByDay[k]||[];
    body=`<div class="card sect">
      <h2>${ref.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})} <span class="cnt">${list.length}</span></h2>
      ${list.length?`<div style="display:flex;flex-direction:column;gap:6px">${list.map(calPill).join("")}</div>`:'<div class="empty">No active tasks starting on this day.</div>'}
    </div>`;
  } else if(view==="week"){
    const monday=weekStart(ref); const cells=[];
    for(let i=0;i<7;i++){ const d=new Date(monday); d.setDate(monday.getDate()+i); cells.push(d); }
    body = mobile
      ? `<div class="cal-list">${dayList(cells,false)}</div>`
      : `<div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells.map(d=>cellHtml(d,false,true)).join("")}</div>`;
  } else { // month
    const y=ref.getFullYear(), m=ref.getMonth();
    const daysInMonth=new Date(y,m+1,0).getDate();
    if(mobile){
      const days=[]; for(let d=1;d<=daysInMonth;d++) days.push(new Date(y,m,d));
      const html=dayList(days,true);
      body=`<div class="cal-list">${html||'<div class="empty">No active tasks starting this month.</div>'}</div>`;
    } else {
      const first=new Date(y,m,1); const startDow=(first.getDay()+6)%7;
      const cells=[];
      for(let i=0;i<startDow;i++){ const d=new Date(y,m,1-(startDow-i)); cells.push({date:d,out:true}); }
      for(let d=1;d<=daysInMonth;d++) cells.push({date:new Date(y,m,d),out:false});
      while(cells.length%7!==0){ const last=cells[cells.length-1].date; cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),out:true}); }
      body=`<div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells.map(c=>cellHtml(c.date,c.out,false)).join("")}</div>`;
    }
  }

  const vbtn=(v,l)=>`<button class="chip ${view===v?'active':''}" data-calview="${v}">${l}</button>`;
  return `<div class="page-head"><div><h1>Calendar</h1><div class="sub">Active tasks, by start date &amp; time</div></div></div>
    <div class="calbar">
      <div class="calviews">${vbtn("today","Today")}${vbtn("week","This Week")}${vbtn("month","This Month")}</div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <button class="btn sm" id="calPrev">‹ Prev</button>
        <h2>${calTitle(view,ref)}</h2>
        <button class="btn sm" id="calNext">Next ›</button>
        <button class="btn sm" id="calToday">Today</button>
      </div>
    </div>
    ${body}`;
}
function bindCalendar(c){
  c.querySelectorAll("[data-calview]").forEach(el=>el.onclick=()=>{ state.calView=el.dataset.calview; renderContent(); });
  const step=(dir)=>{
    const view=state.calView||"month"; const d=new Date(state.calRef);
    if(view==="today") d.setDate(d.getDate()+dir);
    else if(view==="week") d.setDate(d.getDate()+7*dir);
    else d.setMonth(d.getMonth()+dir);
    state.calRef=d; renderContent();
  };
  const p=$("#calPrev"); if(p) p.onclick=()=>step(-1);
  const n=$("#calNext"); if(n) n.onclick=()=>step(1);
  const t=$("#calToday"); if(t) t.onclick=()=>{ state.calRef=new Date(); renderContent(); };
  c.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{ state.drawer={type:"day",date:el.dataset.day}; renderDrawer(); });
  // Click a task pill: route to the Tasks Board and open the task to complete/update.
  c.querySelectorAll("[data-goto]").forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    state.view="board"; state.drawer={type:"task", id:el.dataset.goto}; render();
  });
}

function renderDrawer(){
  const root=$("#drawer-root");
  if(!state.drawer){ root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl"></div>`; return; }
  if(state.drawer.type==="task") return renderTaskDrawer();
  if(state.drawer.type==="day") return renderDayDrawer();
}
function closeDrawer(){ state.drawer=null;
  const s=$("#scrim"), d=$("#drawerEl"); if(s)s.classList.remove("show"); if(d)d.classList.remove("show");
}
function drawerShell(inner){
  const root=$("#drawer-root");
  root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl">${inner}</div>`;
  requestAnimationFrame(()=>{ $("#scrim").classList.add("show"); $("#drawerEl").classList.add("show"); });
  $("#scrim").onclick=closeDrawer;
  const x=$("#drawerClose"); if(x)x.onclick=closeDrawer;
}

      </div>
      <button class="x" id="drawerClose">✕</button>
    </div>
    <div class="dbody">
      <div class="dsec" style="margin-bottom:14px">

        <select id="dStatus" class="statussel ${STATUS_CLASS[t.status]||'s-todo'}" style="width:100%;max-width:none;padding:9px 28px 9px 12px;font-size:13px;border-radius:9px">

        <button class="btn sm" data-q="text">📱 Text Owner</button>
        ${isAdmin()?`
        <button class="btn sm" data-q="ask">💬 Ask for Update</button>
        <button class="btn sm" data-q="move">📅 Move Due Date</button>
        <button class="btn sm" data-q="edit">✎ Edit</button>

      </div>
      <div class="meta">
        ${meta("Owner", esc(t.owner||'—'))}
        ${meta("Manager", esc(t.manager||'—'))}
        ${meta("Department", esc(t.department))}
        ${meta("Priority", prPill(t.priority))}
        ${meta("Status", statusPill(t.status))}
        ${meta("Requires Approval", t.requiresApproval?'🛡️ Yes':'No')}
        ${meta("Cadence", isRecurring(t)?'↻ '+esc(t.cadence):esc(t.cadence||'One Off'))}
        ${meta("Start", fmtDateTime(t.startDate,t.startTime))}
        ${meta("Due", `<span class="${od?'overdue-txt':''}">${fmtDateTime(t.dueDate,t.dueTime)}</span>`)}
        ${meta("Last Update", t.lastUpdate?fmtFull(t.lastUpdate):'—')}
      </div>

      ${(t.requiresApproval && t.status==="For Approval")?`<div class="banner" style="border-color:#5a4d1f;background:#1f1c10;color:#e7cf6b;margin-bottom:18px">⏳ Awaiting manager approval${t.manager?' by '+esc(t.manager):''}. The manager marks this Approved / Done.</div>`:''}

      <div class="dsec">
        <div class="ht">Notes</div>
        <textarea class="notes-ta" id="dNotes" placeholder="Add notes…">${esc(t.notes||'')}</textarea>
      </div>

      <div class="dsec att">
        <div class="ht">📎 File / Attachment</div>
        ${(t.attachments||[]).map((a,i)=>`<div class="linkrow">📎 ${a.url?`<a href="${esc(a.url)}" target="_blank" rel="noreferrer">${esc(a.name||a.url)}</a>`:esc(a.name||'(no link)')}${a.notes?` <span class="sub" style="color:var(--muted2)">— ${esc(a.notes)}</span>`:''}<button class="micro del" data-attdel="${i}" style="margin-left:auto">✕</button></div>`).join("")||'<div class="sub" style="color:var(--muted2)">No file/attachment yet.</div>'}
        <div class="add"><input id="attName" placeholder="File name"/><input id="attUrl" placeholder="Google Drive / Dropbox / file URL"/><button class="btn sm" id="attAdd">Add</button></div>

        <div class="add"><input id="lnkLabel" placeholder="Label"/><input id="lnkUrl" placeholder="https://…"/><button class="btn sm" id="lnkAdd">Add</button></div>

      <div class="dsec clist">

        ${(t.checklist||[]).map((c,i)=>`<label class="check ${c.done?'done':''}"><input type="checkbox" data-chk="${i}" ${c.done?'checked':''}/><span style="flex:1">${esc(c.text)}</span><button class="micro del" data-chkdel="${i}">✕</button></label>`).join("")||'<div class="sub" style="color:var(--muted2)">No checklist items.</div>'}
        <div class="add"><input id="chkText" placeholder="Add checklist item…"/><button class="btn sm" id="chkAdd">Add</button></div>
      </div>

      <div class="dsec cmt">
        <div class="ht">Comments</div>
        ${(t.comments||[]).map(c=>`<div class="comment"><div class="ca"><b>${esc(c.author)}</b> · ${timeAgo(c.ts)}</div>${esc(c.text)}</div>`).join("")||'<div class="sub" style="color:var(--muted2)">No comments.</div>'}
        <div class="add"><input id="cmtText" placeholder="Write a comment…"/><button class="btn sm" id="cmtAdd">Post</button></div>
      </div>

      <div class="dsec">
        <div class="ht">Activity History</div>
        <ul class="actlog">${(t.activity||[]).map(a=>`<li><b>${esc(a.by||'')}</b> ${esc(a.text)} · <span style="color:var(--muted2)">${timeAgo(a.ts)}</span></li>`).join("")||'<li>No activity yet.</li>'}</ul>
      </div>
    </div>`;
  drawerShell(inner);

  const reopen=()=>{ if(state.drawer&&state.drawer.type==="task"&&state.drawer.id===t.id) renderTaskDrawer(); };
  const dStatus=$("#dStatus");
  if(dStatus) dStatus.onchange=()=>{ changeStatus(t, dStatus.value).then(reopen); };
  $("#drawerEl").querySelectorAll("[data-q]").forEach(el=>el.onclick=()=>{
    const q=el.dataset.q;
    if(q==="ask") quickAskUpdate(t).then(reopen);
    else if(q==="email") quickEmail(t);
    else if(q==="text") quickText(t);
    else if(q==="approval") submitForApproval(t).then(reopen);
    else if(q==="done") markDone(t).then(reopen);
    else if(q==="move") moveDueDate(t).then(reopen);
    else if(q==="edit"){ closeDrawer(); openTaskModal(t); }
    else if(q==="del") deleteTask(t.id);
  });

  const notes=$("#dNotes");
  if(!isAdmin()){ notes.setAttribute("readonly","readonly"); notes.style.opacity=".7"; }
  else notes.onblur=async()=>{ if((t.notes||"")!==notes.value){ t.notes=notes.value; addActivity(t,"Updated notes"); t.lastUpdate=new Date().toISOString(); await persistTask(t); } };

  $("#attAdd").onclick=async()=>{ const u=$("#attUrl").value.trim(), nm=$("#attName").value.trim(); if(!u&&!nm)return; (t.attachments=t.attachments||[]).push({name:nm||u,url:u,notes:""}); addActivity(t,"Added a file/attachment"); await persistTask(t); renderTaskDrawer(); render(); };
  $("#drawerEl").querySelectorAll("[data-attdel]").forEach(el=>el.onclick=async()=>{ t.attachments.splice(+el.dataset.attdel,1); await persistTask(t); renderTaskDrawer(); render(); });

  $("#lnkAdd").onclick=async()=>{ const u=$("#lnkUrl").value.trim(); if(!u)return; (t.links=t.links||[]).push({label:$("#lnkLabel").value.trim(),url:u}); addActivity(t,"Added a link"); await persistTask(t); renderTaskDrawer(); };
  $("#drawerEl").querySelectorAll("[data-linkdel]").forEach(el=>el.onclick=async()=>{ t.links.splice(+el.dataset.linkdel,1); await persistTask(t); renderTaskDrawer(); });

  $("#chkAdd").onclick=async()=>{ const v=$("#chkText").value.trim(); if(!v)return; (t.checklist=t.checklist||[]).push({text:v,done:false}); await persistTask(t); renderTaskDrawer(); };
  $("#drawerEl").querySelectorAll("[data-chk]").forEach(el=>el.onchange=async()=>{ t.checklist[+el.dataset.chk].done=el.checked; t.lastUpdate=new Date().toISOString(); await persistTask(t); renderTaskDrawer(); render(); });
  $("#drawerEl").querySelectorAll("[data-chkdel]").forEach(el=>el.onclick=async()=>{ t.checklist.splice(+el.dataset.chkdel,1); await persistTask(t); renderTaskDrawer(); });

  $("#cmtAdd").onclick=async()=>{ const v=$("#cmtText").value.trim(); if(!v)return; (t.comments=t.comments||[]).unshift({author:state.user||"You",text:v,ts:new Date().toISOString()}); addActivity(t,"Commented"); t.lastUpdate=new Date().toISOString(); await persistTask(t); renderTaskDrawer(); render(); };
}

function renderDayDrawer(){
  const date=state.drawer.date;
  const list=state.tasks.filter(t=>t.startDate===date && isActive(t)).sort((a,b)=>(a.startTime||"")>(b.startTime||"")?1:-1);
  const d=new Date(date+"T00:00");
  const inner=`
    <div class="dh">
      <div style="flex:1"><div class="k" style="font-size:11px;color:var(--muted2);text-transform:uppercase">${d.toLocaleDateString(undefined,{weekday:'long'})}</div>
      <div style="font-size:18px;font-weight:700">${d.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'})}</div>
      <div class="sub">${list.length} task${list.length!==1?'s':''} starting</div></div>
      <button class="x" id="drawerClose">✕</button>
    </div>
    <div class="dbody">
      ${list.length?list.map(t=>`
        <div class="card sect" data-open="${t.id}" style="margin-bottom:10px;cursor:pointer;padding:13px">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">${deptPill(t.department)}${prPill(t.priority)}${statusPill(t.status)}</div>
          <div style="font-weight:700">${esc(t.name)}</div>
          <div class="sub" style="margin-top:4px;display:flex;align-items:center;gap:6px">${ownerAv(t.owner)} ${esc(t.owner||'Unassigned')} · Start ${t.startTime?fmtTime(t.startTime):'(no time)'} · Due ${esc(fmtDateTime(t.dueDate,t.dueTime))}</div>
        </div>`).join(""):'<div class="empty">No active tasks starting this day.</div>'}
      ${isAdmin()?'<button class="btn primary" id="dayNew" style="width:100%;margin-top:8px">＋ New task on this day</button>':''}
    </div>`;
  drawerShell(inner);
  $("#drawerEl").querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>{ state.drawer={type:"task",id:el.dataset.open}; renderDrawer(); });
  const dn=$("#dayNew"); if(dn) dn.onclick=()=>{ const t=blankTask(); t.dueDate=date; t.startDate=date; closeDrawer(); openTaskModal(t,true); };
}

/* ===========================================================================
   MODALS (New/Edit task, Templates)
   =========================================================================== */
function openTaskModal(task, forceNew){
  if(!requireAdmin()) return;
  const isNew = forceNew || !task;
  state.modal={type:"task", task: task?JSON.parse(JSON.stringify(task)):blankTask(), isNew};
  renderModal();
}
function openTemplates(){ state.modal={type:"templates"}; renderModal(); }
function closeModal(){ state.modal=null; renderModal(); }

function renderModal(){
  const root=$("#modal-root");
  if(!state.modal){ root.innerHTML=""; return; }
  if(state.modal.type==="templates") return renderTemplatesModal();
  if(state.modal.type==="import") return renderImportModal();
  if(state.modal.type==="attach") return renderAttachmentModal();
  if(state.modal.type==="confirmDelete") return renderConfirmDeleteModal();
  if(state.modal.type==="mktEntry") return renderMktEntryModal();
  if(state.modal.type==="mktCsv") return renderMktCsvModal();
  return renderTaskModal();
}

function renderConfirmDeleteModal(){
  const t=state.tasks.find(x=>x.id===state.modal.id);
  const root=$("#modal-root");
  root.innerHTML=`
  <div class="modal show"><div class="box" style="max-width:440px">
    <div class="mh"><h3>Delete Task</h3><button class="x" id="modalClose">✕</button></div>
    <div class="mb">
      <div style="font-size:14px">Are you sure you want to delete this task?</div>
      ${t?`<div class="sub" style="margin-top:8px;color:var(--muted)">“${esc(t.name)}”</div>`:''}
      <div class="hint" style="margin-top:10px">The task is removed from the board, calendar, and dashboard, but kept in Supabase for history.</div>
    </div>
    <div class="mf"><button class="btn" id="modalCancel">Cancel</button><button class="btn danger" id="confirmDel">Delete Task</button></div>
  </div></div>`;
  $("#modalClose").onclick=closeModal; $("#modalCancel").onclick=closeModal;
  $("#confirmDel").onclick=()=>softDeleteTask(state.modal.id);
}

/* Small popup to add/update a task's file attachment from the board (no full edit). */
function openAttachmentModal(id){ state.modal={type:"attach", id}; renderModal(); }
function renderAttachmentModal(){

  if(!t){ closeModal(); return; }
  const a=(t.attachments && t.attachments[0]) || {name:"",url:"",notes:""};
  const root=$("#modal-root");
  root.innerHTML=`
  <div class="modal show"><div class="box" style="max-width:480px">

      </div>

    <div class="mf">

      <button class="btn" id="modalCancel">Cancel</button>
      <button class="btn primary" id="at_save">Save</button>

    if(!url && !name){ toast("Add a file name or link"); return; }
    t.attachments = t.attachments || [];
    t.attachments[0] = {name:name||url, url, notes};

function renderTaskModal(){
  const t=state.modal.task, isNew=state.modal.isNew;

  const root=$("#modal-root");
  root.innerHTML=`

      <div class="fld full"><label>Task name</label><input id="f_name" value="${esc(t.name)}" placeholder="e.g. Run weekly payroll"/></div>
      <div class="fld"><label>Owner</label><input id="f_owner" list="ownerList" value="${esc(t.owner)}" placeholder="Assign to…"/>
        <datalist id="ownerList">${owners.map(o=>`<option value="${esc(o)}"></option>`).join("")}</datalist></div>
      <div class="fld"><label>Manager</label><select id="f_manager"><option value="">— Select —</option>${mgrOpts.map(o=>`<option ${t.manager===o?'selected':''}>${esc(o)}</option>`).join("")}</select></div>
      <div class="fld"><label>Department</label><select id="f_department">${opt(DEPARTMENTS,t.department)}</select></div>
      <div class="fld"><label>Priority</label><select id="f_priority">${opt(PRIORITIES,t.priority)}</select></div>
      <div class="fld"><label>Status</label><select id="f_status">${opt(STATUSES,t.status)}</select></div>
      <div class="fld"><label>Cadence</label><select id="f_cadence">${opt(CADENCES,t.cadence)}</select></div>
      <div class="fld"><label>Requires Approval?</label><select id="f_approval"><option value="No" ${!t.requiresApproval?'selected':''}>No</option><option value="Yes" ${t.requiresApproval?'selected':''}>Yes</option></select></div>
      <div class="fld"><label>Start date &amp; time</label><div class="row2"><input type="date" id="f_startDate" value="${esc(t.startDate||'')}"/><input type="time" id="f_startTime" value="${esc(t.startTime||'')}"/></div></div>
      <div class="fld"><label>Due date &amp; time</label><div class="row2"><input type="date" id="f_dueDate" value="${esc(t.dueDate||'')}"/><input type="time" id="f_dueTime" value="${esc(t.dueTime||'')}"/></div></div>
      <div class="fld full"><label>File / Attachment Link</label><input id="f_attUrl" value="${esc(att.url||'')}" placeholder="Paste a Google Drive, Dropbox, or file URL"/></div>
      <div class="fld"><label>Attachment name</label><input id="f_attName" value="${esc(att.name||'')}" placeholder="e.g. Signed contract.pdf"/></div>
      <div class="fld"><label>Attachment notes</label><input id="f_attNotes" value="${esc(att.notes||'')}" placeholder="optional"/></div>
      <div class="fld full"><label>Notes</label><textarea id="f_notes" style="min-height:70px">${esc(t.notes||'')}</textarea></div>
    </div></div>
    <div class="mf"><button class="btn" id="modalCancel">Cancel</button><button class="btn primary" id="modalSave">${isNew?'Create Task':'Save Changes'}</button></div>
  </div></div>`;
  $("#modalClose").onclick=closeModal; $("#modalCancel").onclick=closeModal;
  const ut=$("#useTemplate"); if(ut) ut.onclick=openTemplates;
  $("#modalSave").onclick=async()=>{
    const g=id=>$("#"+id).value;
    t.name=g("f_name").trim(); if(!t.name){ toast("Task name is required"); return; }
    t.owner=g("f_owner").trim(); t.manager=g("f_manager");
    t.department=g("f_department"); t.priority=g("f_priority"); t.status=g("f_status"); t.cadence=g("f_cadence");
    t.requiresApproval = g("f_approval")==="Yes";
    t.startDate=g("f_startDate"); t.startTime=g("f_startTime");
    t.dueDate=g("f_dueDate"); t.dueTime=g("f_dueTime");
    t.notes=g("f_notes");
    // Save the file/attachment link (keep any additional attachments already on the task).
    const aUrl=g("f_attUrl").trim(), aName=g("f_attName").trim(), aNotes=g("f_attNotes").trim();
    t.attachments = t.attachments || [];
    if(aUrl || aName){ t.attachments[0] = {name:aName||aUrl, url:aUrl, notes:aNotes}; }
    else if(t.attachments.length){ t.attachments.shift(); }
    if(!isNew){ const orig=state.tasks.find(x=>x.id===t.id); if(orig) addActivity(orig,"Task edited"); }
    await saveTask(t,{isNew});
    closeModal();
    toast(isNew?"Task created":"Task saved");
  };
}

/* ===========================================================================
   SPREADSHEET IMPORT (CSV file or paste from Excel/Google Sheets)

const IMPORT_FIELDS = {
  name:["name","task","task name","title"],
  owner:["owner","assignee","assigned to","assigned"],
  manager:["manager"],
  department:["department","dept"],
  priority:["priority"],
  status:["status"],
  startDate:["startdate","start date","start"],
  startTime:["starttime","start time"],
  dueDate:["duedate","due date","due"],
  dueTime:["duetime","due time"],
  cadence:["cadence","recurrence","repeat"],
  requiresApproval:["requiresapproval","requires approval","approval"],
  notes:["notes","note","description"],
  attachment:["attachment","file","link","attachment link","file / attachment link"]
};
const IMPORT_HEADERS = Object.keys(IMPORT_FIELDS);

function parseDelimited(text, delim){
  const rows=[]; let row=[], field="", q=false;
  text = String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===delim){ row.push(field); field=""; }
      else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function matchOne(v, list, fallback){
  const s=String(v||"").trim().toLowerCase();
  if(!s) return fallback;
  return list.find(o=>o.toLowerCase()===s) || fallback;
}
function normDate(s){
  s=String(s||"").trim(); if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){ let y=m[3]; if(y.length===2) y="20"+y; return `${y}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`; }
  const d=new Date(s); if(!isNaN(d)) return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  return s;
}
function normTime(s){
  s=String(s||"").trim(); if(!s) return "";
  let m=s.match(/^(\d{1,2}):(\d{2})\s*([ap]m)?$/i);
  if(m){ let h=+m[1]; const ap=(m[3]||"").toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":"+m[2]; }
  m=s.match(/^(\d{1,2})\s*([ap]m)$/i);
  if(m){ let h=+m[1]; const ap=m[2].toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":00"; }
  return s;
}
/* Normalize slightly-different cadence text from a spreadsheet to a valid option. */
function normCadence(s){
  const v=String(s||"").trim().toLowerCase().replace(/[\s_-]+/g,"");
  if(!v) return "One Off";
  const map={oneoff:"One Off",once:"One Off",none:"One Off",adhoc:"One Off",
    daily:"Daily",day:"Daily",everyday:"Daily",
    weekly:"Weekly",week:"Weekly",
    biweekly:"Bi-Weekly",fortnightly:"Bi-Weekly",everytwoweeks:"Bi-Weekly",
    monthly:"Monthly",month:"Monthly",
    quarterly:"Quarterly",quarter:"Quarterly",every3months:"Quarterly"};
  return map[v] || matchOne(s, CADENCES, "One Off");
}
/* Resolve the nth (1..5, or -1=last) weekday of a given month to a Date. */
function nthWeekdayOfMonth(year, month, weekday, ord){
  if(ord===-1){
    const last=new Date(year, month+1, 0);
    const d=new Date(last);
    while(d.getDay()!==weekday) d.setDate(d.getDate()-1);
    return d;
  }
  let count=0;
  for(let day=1; day<=31; day++){
    const date=new Date(year, month, day);
    if(date.getMonth()!==month) break;
    if(date.getDay()===weekday){ count++; if(count===ord) return date; }
  }
  return null;
}
/* Parse a schedule phrase (or a literal date) into an actual date.
   Returns { date:"YYYY-MM-DD"|"", ruleText:"<phrase>"|"", ok:bool }. */
function parseScheduleRule(input){
  const raw=String(input||"").trim();
  if(!raw) return {date:"", ruleText:"", ok:true};
  const s=raw.toLowerCase();
  const today=new Date(); today.setHours(0,0,0,0);
  const ds=d=>new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  const WD={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sun:0,mon:1,tue:2,tues:2,wed:3,thu:4,thur:4,thurs:4,fri:5,sat:6};
  const ORD={first:1,second:2,third:3,fourth:4,fifth:5,last:-1,"1st":1,"2nd":2,"3rd":3,"4th":4,"5th":5};

  if(s==="today") return {date:ds(today), ruleText:raw, ok:true};
  if(s==="tomorrow"){ const d=new Date(today); d.setDate(d.getDate()+1); return {date:ds(d), ruleText:raw, ok:true}; }

  // every weekday (Mon–Fri)
  if(/\bevery\s+weekday\b/.test(s) || s==="weekday"){
    const d=new Date(today); while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // every <ordinal> <weekday> of the month
  let m=s.match(/\b(first|second|third|fourth|fifth|last|1st|2nd|3rd|4th|5th)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tues?|wed|thur?s?|fri|sat)\b/);
  if(m){
    const ord=ORD[m[1]], wd=WD[m[2]];
    let d=nthWeekdayOfMonth(today.getFullYear(), today.getMonth(), wd, ord);
    if(d && d<today) d=nthWeekdayOfMonth(today.getFullYear(), today.getMonth()+1, wd, ord);
    return d ? {date:ds(d), ruleText:raw, ok:true} : {date:"", ruleText:"", ok:false};
  }
  // monthly on the Nth (e.g. "Every month on the 15th", "15th of every month")
  m=s.match(/\b(\d{1,2})(?:st|nd|rd|th)?\b/);
  if(m && /\bmonth\b/.test(s)){
    const day=+m[1]; let d=new Date(today.getFullYear(), today.getMonth(), day);
    if(d<today) d=new Date(today.getFullYear(), today.getMonth()+1, day);
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // every <weekday> / plain weekday name -> next occurrence on/after today
  m=s.match(/\b(?:every\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\b/);
  if(m){
    const wd=WD[m[1]]; const d=new Date(today); d.setDate(d.getDate()+((wd-d.getDay()+7)%7));
    return {date:ds(d), ruleText:raw, ok:true};
  }
  // literal date (YYYY-MM-DD or M/D/YYYY) — not a rule
  const nd=normDate(raw);
  if(/^\d{4}-\d{2}-\d{2}$/.test(nd)) return {date:nd, ruleText:"", ok:true};
  return {date:"", ruleText:"", ok:false};   // unrecognized
}
function rowsToTasks(rows){
  if(!rows || !rows.length) return {tasks:[], skipped:0, error:"No rows found.", warnings:[]};
  const header = rows[0].map(h=>String(h||"").trim().toLowerCase());
  const colField={};
  header.forEach((h,idx)=>{ for(const f of IMPORT_HEADERS){ if(IMPORT_FIELDS[f].includes(h)){ colField[idx]=f; break; } } });
  if(!Object.values(colField).includes("name"))
    return {tasks:[], skipped:0, error:"No 'name' (or 'task') column found in the first row. The first row must be a header.", warnings:[]};
  const tasks=[]; let skipped=0; const warnings=[];
  for(let r=1;r<rows.length;r++){
    const cells=rows[r];
    if(!cells || cells.every(c=>!String(c||"").trim())) continue;
    const o={}; cells.forEach((v,idx)=>{ if(colField[idx]!=null) o[colField[idx]]=String(v==null?"":v).trim(); });
    if(!o.name){ skipped++; continue; }
    const t=blankTask();
    t.name=o.name;
    if(o.owner) t.owner=o.owner;
    if(o.manager) t.manager=o.manager;
    t.department=matchOne(o.department, DEPARTMENTS, "Operations");
    t.priority=matchOne(o.priority, PRIORITIES, "Normal");
    t.status=matchOne(o.status, STATUSES, "") || mapStatus(o.status);
    t.cadence=normCadence(o.cadence);
    t.requiresApproval=/^(yes|y|true|1)$/i.test(o.requiresApproval||"");
    // Smart Start/Due dates: understand schedule phrases as well as literal dates.
    const sr=parseScheduleRule(o.startDate), dr=parseScheduleRule(o.dueDate);
    if(o.startDate && !sr.ok) warnings.push(`"${o.name}": couldn't understand start date "${o.startDate}"`);
    if(o.dueDate && !dr.ok) warnings.push(`"${o.name}": couldn't understand due date "${o.dueDate}"`);
    if(sr.date) t.startDate=sr.date;
    if(dr.date) t.dueDate=dr.date;
    if(sr.ruleText) t.startRule=sr.ruleText;
    if(dr.ruleText) t.dueRule=dr.ruleText;
    const rule = sr.ruleText || dr.ruleText;
    if(rule) t.scheduleRule=rule;            // original phrase kept in the task JSON
    if(o.startTime) t.startTime=normTime(o.startTime);
    if(o.dueTime) t.dueTime=normTime(o.dueTime);
    if(o.notes) t.notes=o.notes;
    if(o.attachment) t.attachments=[{name:o.attachment, url:o.attachment, notes:""}];
    tasks.push(t);
  }
  return {tasks, skipped, error:null, warnings};
}
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadTemplate(){
  const sample=["Monthly board meeting","Lisa","Sammy","Managers","High","To Do","Every first Thursday of the month","09:00","Every first Thursday of the month","15:00","Monthly","Yes","Prep agenda",""];
  const csv=[IMPORT_HEADERS, sample].map(r=>r.map(csvCell).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="task-import-template.csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function openImportModal(){ if(!requireAdmin()) return; state.modal={type:"import", parsed:null, skipped:0, error:null, sendEmails:false}; renderModal(); }
function doParseImport(text){
  text=String(text||"").trim();
  if(!text){ state.modal.error="Nothing to parse — paste rows or choose a CSV file."; state.modal.parsed=null; renderModal(); return; }
  const firstLine=text.split("\n")[0];
  const delim = (firstLine.split("\t").length > firstLine.split(",").length) ? "\t" : ",";
  const res=rowsToTasks(parseDelimited(text, delim));
  state.modal.error=res.error; state.modal.parsed=res.error?null:res.tasks; state.modal.skipped=res.skipped||0;
  state.modal.warnings=res.warnings||[];
  renderModal();
}
async function doImport(tasks, sendEmails){
  if(!requireAdmin()) return;
  if(!tasks || !tasks.length) return;
  if(state.modal && state.modal._importing) return;   // guard against double-submit duplicates
  if(state.modal) state.modal._importing = true;
  const go=$("#importGo"); if(go){ go.disabled=true; go.textContent="Importing…"; }

  const list = tasks.slice();
  const lead = (state.cfg.reminderLeadMin||120) * 60000;
  for(const t of list){
    const n = ensureNotif(t);
    if(!sendEmails) n.assigned=true;                   // suppress assignment email unless asked
    // Suppress the reminder backlog: imported tasks already past-due / due-soon
    // must NOT blast overdue/due-soon emails. Future tasks still get one reminder.
    const d = dueDateTime(t);
    if(d){ const ms=d.getTime()-Date.now(); if(ms<=0){ n.overdue=true; n.almost=true; } else if(ms<=lead){ n.almost=true; } }
    addActivity(t, "Imported from spreadsheet");
    state.tasks.push(t);
  }
  const ok = await persistTasks(list);                 // single bulk upsert (fast, atomic-ish)
  if(sendEmails){                                       // optional: notify owners (throttled)
    for(const t of list){ if(t.owner) await notifyAssigned(t, "created"); }
    await persistTasks(list.filter(t=>t.owner));        // save the updated notif flags
  }
  closeModal();
  toast(`Imported ${list.length} task${list.length!==1?'s':''}`+(ok===false?" (save error — check connection)":""));
  render();
}

        <div style="margin-top:8px;max-height:170px;overflow:auto;width:100%">${p.slice(0,100).map(t=>`<div style="font-size:12px;padding:2px 0">• ${esc(t.name)} <span style="color:var(--muted2)">— ${esc(t.owner||'Unassigned')} · ${esc(t.department)} · start ${esc(fmtDateTime(t.startDate,t.startTime))} · due ${esc(fmtDateTime(t.dueDate,t.dueTime))}${t.scheduleRule?' · 🔁 '+esc(t.scheduleRule):''}${t.requiresApproval?' · 🛡️':''}</span></div>`).join("")}</div></div>
