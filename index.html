<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operations Command Center — Task Board</title>
<style>
  :root{
    --bg:#0c0e12; --bg2:#0f1217; --card:#161a21; --card2:#1b212a;
    --border:#262c37; --border2:#313947;
    --text:#f2f4f8; --muted:#9aa4b2; --muted2:#6b7585;
    --accent:#4a90e2; --accent2:#3a7bd5;
    --red:#ff4d4d; --red-soft:#3a1c1f;
    --shadow:0 6px 22px rgba(0,0,0,.45);
    --radius:14px;
    /* department colors */
    --d-sales:#f5c542; --d-managers:#f0588b; --d-marketing:#a06bff;
    --d-operations:#4a90e2; --d-finance:#3ec98a; --d-admin:#8b95a5; --d-personal:#d7dce3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent)}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2b323d;border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  .app{display:flex;min-height:100vh}

  /* Sidebar */
  .sidebar{width:232px;flex:0 0 232px;background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#7d5fff);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;box-shadow:var(--shadow)}
  .brand .t{font-weight:700;font-size:15px;line-height:1.1}
  .brand .s{font-size:11px;color:var(--muted)}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;
    border:0;color:var(--muted);padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500}
  .nav button:hover{background:var(--card);color:var(--text)}
  .nav button.active{background:var(--card2);color:var(--text)}
  .nav button .ic{width:18px;text-align:center;font-size:15px}
  .nav button .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;
    padding:1px 7px;border-radius:20px}
  .side-foot{margin-top:auto;padding:10px 8px 0;font-size:11px;color:var(--muted2)}
  .conn{display:flex;align-items:center;gap:7px;font-size:11.5px;padding:8px 10px;border-radius:9px;background:var(--card)}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.live{background:var(--d-finance);box-shadow:0 0 0 3px rgba(62,201,138,.18)}
  .dot.demo{background:var(--d-sales);box-shadow:0 0 0 3px rgba(245,197,66,.18)}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);
    background:rgba(12,14,18,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30}
  .search{flex:1;max-width:520px;position:relative}
  .search input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:10px 12px 10px 36px;border-radius:11px;font-size:13.5px;outline:none}
  .search input:focus{border-color:var(--border2)}
  .search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted2)}
  .topbar .spacer{flex:1}
  .iconbtn{position:relative;background:var(--card);border:1px solid var(--border);color:var(--text);
    width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{background:var(--card2)}
  .iconbtn .nb{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;
    min-width:17px;height:17px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:11px;
    cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--card2)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{background:var(--red-soft);border-color:#5a2a2e;color:#ff8a8a}
  .btn.sm{padding:6px 10px;font-size:12px;border-radius:9px}
  .profile{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);
    padding:5px 12px 5px 6px;border-radius:30px;cursor:pointer}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--card2);display:flex;align-items:center;
    justify-content:center;font-weight:700;font-size:12px;color:var(--text);border:1px solid var(--border2)}
  .profile .pn{font-size:13px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .content{padding:22px;flex:1}
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h1{font-size:21px;margin:0;font-weight:700}
  .page-head .sub{color:var(--muted);font-size:13px}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:22px}
  @media(max-width:1200px){.kpis{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;
    cursor:pointer;transition:.12s;position:relative;overflow:hidden}
  .kpi:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
  .kpi.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,144,226,.25)}
  .kpi .v{font-size:28px;font-weight:800;line-height:1}
  .kpi .l{color:var(--muted);font-size:12.5px;margin-top:8px}
  .kpi .acc{position:absolute;left:0;top:0;bottom:0;width:4px}
  .kpi.danger .v{color:var(--red)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
  @media(max-width:980px){.grid2{grid-template-columns:1fr}}
  .sect{padding:16px 18px}
  .sect h2{font-size:15px;margin:0 0 12px;font-weight:700;display:flex;align-items:center;gap:8px}
  .sect h2 .cnt{color:var(--muted);font-weight:600;font-size:12.5px}

  /* Filters */
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .chip{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 13px;border-radius:30px;
    cursor:pointer;font-size:12.5px;font-weight:600}
  .chip:hover{color:var(--text);border-color:var(--border2)}
  .chip.active{background:var(--text);color:#10131a;border-color:var(--text)}
  select.f{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:9px;
    font-size:12.5px;cursor:pointer;outline:none}
  .clearf{margin-left:auto}

  /* Table / board */
  .deptsec{margin-bottom:14px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}
  .dephead{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;background:var(--card2)}
  .dephead:hover{filter:brightness(1.05)}
  .dephead .bar{width:5px;height:26px;border-radius:4px}
  .dephead .dn{font-weight:700;font-size:14.5px}
  .dephead .dc{color:var(--muted);font-size:12.5px;background:var(--bg2);padding:2px 9px;border-radius:20px}
  .dephead .mem{margin-left:auto;display:flex;align-items:center}
  .mem .av{width:26px;height:26px;border-radius:50%;border:2px solid var(--card2);margin-left:-7px;display:flex;
    align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#10131a}
  .dephead .car{margin-left:14px;color:var(--muted);transition:.15s;font-size:12px}
  .dephead.collapsed .car{transform:rotate(-90deg)}

  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);
    font-weight:600;padding:9px 12px;border-bottom:1px solid var(--border)}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--card2)}
  tbody tr:last-child td{border-bottom:0}
  .tname{font-weight:600}
  .tname .od{color:var(--muted);font-size:11.5px;font-weight:500}
  .ownercell{display:flex;align-items:center;gap:8px}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;
    border:1px solid transparent;white-space:nowrap}
  .dpill{color:#10131a}
  .stat{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
  .s-todo{background:#23272f;color:#c4ccd8}
  .s-prog{background:#15324f;color:#7fb6f0}
  .s-wait{background:#3a3417;color:#e7cf6b}
  .s-block{background:var(--red-soft);color:#ff8a8a}
  .s-approval{background:#3a2a14;color:#f5c542}
  .s-done{background:#143526;color:#5fd49b}
  .s-rec{background:#1f2f47;color:#8fb8e8}
  /* status dropdown styled as a colored badge (inherits the s-* background/color) */
  select.statussel{appearance:none;-webkit-appearance:none;-moz-appearance:none;border:1px solid var(--border2);
    border-radius:20px;padding:4px 24px 4px 11px;font-size:11.5px;font-weight:600;cursor:pointer;outline:none;max-width:170px;
    background-repeat:no-repeat;background-position:right 8px center;background-size:9px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3' stroke-opacity='.6'><path d='M6 9l6 6 6-6'/></svg>")}
  select.statussel:hover{filter:brightness(1.08)}
  select.statussel option{background:var(--card2);color:var(--text);font-weight:500}
  .pr{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px}
  .pr-Critical{background:var(--red);color:#fff}
  .pr-High{background:#7a3b16;color:#ffb27a}
  .pr-Normal{background:#23303f;color:#8fb1d6}
  .pr-Low{background:#23272f;color:#9aa4b2}
  .overdue-txt{color:var(--red);font-weight:700}
  .due{display:flex;flex-direction:column;line-height:1.25}
  .due .tm{font-size:11px;color:var(--muted)}

  .rowact{display:flex;gap:5px;align-items:center}
  .micro{background:transparent;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;
    border-radius:8px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
  .micro:hover{background:var(--card2);color:var(--text);border-color:var(--border2)}
  .micro.go:hover{color:#5fd49b}
  .micro.del:hover{color:#ff8a8a}

  .empty{text-align:center;color:var(--muted2);padding:34px;font-size:13px}

  /* Drawer */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:.18s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:480px;max-width:94vw;background:var(--bg2);
    border-left:1px solid var(--border);z-index:41;transform:translateX(100%);transition:.22s;display:flex;flex-direction:column;
    box-shadow:-12px 0 40px rgba(0,0,0,.5)}
  .drawer.show{transform:translateX(0)}
  .dh{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border)}
  .dh .x{margin-left:auto;background:var(--card);border:1px solid var(--border);color:var(--text);width:32px;height:32px;
    border-radius:9px;cursor:pointer;font-size:16px;flex:0 0 auto}
  .dbody{padding:18px 20px;overflow-y:auto;flex:1}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .meta .m{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .meta .m .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);margin-bottom:5px}
  .meta .m .vv{font-size:13px;font-weight:600}
  .dsec{margin-bottom:20px}
  .dsec .ht{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);font-weight:700;
    margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .check{display:flex;align-items:center;gap:9px;padding:6px 0}
  .check input{width:16px;height:16px;accent-color:var(--accent)}
  .check.done span{text-decoration:line-through;color:var(--muted2)}
  .clist .add,.cmt .add,.lnk .add{display:flex;gap:7px;margin-top:8px}
  .clist .add input,.cmt .add input,.lnk .add input{flex:1;background:var(--card);border:1px solid var(--border);
    color:var(--text);padding:7px 10px;border-radius:8px;font-size:12.5px;outline:none}
  .comment{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:8px}
  .comment .ca{font-size:11.5px;color:var(--muted);margin-bottom:3px}
  .actlog{list-style:none;margin:0;padding:0}
  .actlog li{font-size:12px;color:var(--muted);padding:5px 0 5px 16px;position:relative;border-left:1px solid var(--border);margin-left:4px}
  .actlog li:before{content:"";position:absolute;left:-4px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent2)}
  .actlog li b{color:var(--text);font-weight:600}
  .linkrow{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px}
  .qa{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
  .notes-ta{width:100%;min-height:80px;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:10px 12px;font-size:13px;resize:vertical;outline:none;font-family:inherit}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;background:rgba(0,0,0,.5)}
  .modal.show{display:flex}
  .modal .box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;
    box-shadow:var(--shadow)}
  .modal .box.wide{max-width:860px}
  .mh{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border)}
  .mh h3{margin:0;font-size:17px}
  .mh .x{margin-left:auto;background:var(--card);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px}
  .mb{padding:20px 22px}
  .mf{display:flex;justify-content:flex-end;gap:9px;padding:16px 22px;border-top:1px solid var(--border)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .fld{display:flex;flex-direction:column;gap:6px}
  .fld.full{grid-column:1/-1}
  .fld label{font-size:12px;color:var(--muted);font-weight:600}
  .fld input,.fld select,.fld textarea{background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:9px 11px;border-radius:9px;font-size:13px;outline:none;font-family:inherit}
  .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--border2)}
  .fld .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

  .tmpls{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  @media(max-width:700px){.tmpls{grid-template-columns:1fr 1fr}}
  .tmpl{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px;cursor:pointer}
  .tmpl:hover{border-color:var(--border2);background:var(--card2)}
  .tmpl .tt{font-weight:700;font-size:13.5px;margin-bottom:4px}
  .tmpl .td{font-size:11.5px;color:var(--muted)}

  /* Calendar */
  .calbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .calbar h2{margin:0;font-size:18px;min-width:190px;text-align:center}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);
    border-radius:12px;overflow:hidden}
  .calgrid .dow{background:var(--card2);padding:8px;text-align:center;font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase}
  .cell{background:var(--card);min-height:108px;padding:7px;cursor:pointer;display:flex;flex-direction:column;gap:4px}
  .cell:hover{background:var(--card2)}
  .cell.out{background:var(--bg2);opacity:.5}
  .cell.today .dnum{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cell .dnum{font-size:12px;color:var(--muted);font-weight:700}
  .calpill{display:flex;align-items:center;gap:5px;font-size:10.5px;padding:2px 6px;border-radius:6px;background:var(--card2);
    border-left:3px solid var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .calpill .ini{font-weight:700;font-size:9px;color:#10131a;border-radius:4px;padding:0 3px}
  .calpill .ct{font-size:9.5px;color:var(--muted);margin-left:auto}
  .more{font-size:10.5px;color:var(--muted);font-weight:600;padding-left:3px}

  /* Reports */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12.5px}
  .bar-row .bl{width:120px;color:var(--muted);flex:0 0 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:var(--bg);border-radius:6px;height:22px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#10131a;border-radius:6px}
  .rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.rep-grid{grid-template-columns:1fr}}

  .banner{background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;margin-bottom:18px;
    font-size:13px;color:var(--muted);display:flex;gap:10px;align-items:center}
  .banner.demo{border-color:#5a4d1f;background:#1f1c10;color:#e7cf6b}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);
    color:var(--text);padding:11px 18px;border-radius:11px;box-shadow:var(--shadow);z-index:80;font-size:13px;opacity:0;
    transition:.2s;pointer-events:none}
  .toast.show{opacity:1;bottom:30px}
  .hint{font-size:12px;color:var(--muted2);margin-top:6px}
  code.k{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:12px}
  .members-tbl td{padding:6px 8px}
  .members-tbl input,.members-tbl select{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:7px;font-size:12px}
</style>
</head>
<body>
<div id="app"></div>
<div id="drawer-root"></div>
<div id="modal-root"></div>
<div id="toast" class="toast"></div>

<!-- Supabase JS (loaded from CDN; app still works in local demo mode if this fails) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================================
   Operations Command Center — single-file task board
   - Data persists to Supabase table `tasks` (columns: id, data jsonb, updated_at)
     using one row per task: { id, data:<task>, updated_at }.
   - Falls back to localStorage "demo mode" if Supabase isn't reachable.
   ============================================================================ */

/* ---- Config: reuse existing Supabase project (anon public key only) -------- */
const DEFAULT_SUPABASE_URL  = "https://qegyeuaeggaxxebixwsz.supabase.co";
const DEFAULT_SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZ3lldWFlZ2dheHhlYml4d3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODc5ODYsImV4cCI6MjA5NzU2Mzk4Nn0.i9ecTDd1WDOx85xaT-YjJ7U7kgwC4QAKowaC11uUDmU";

const LS = { cfg:"occ_cfg", demo:"occ_demo_tasks", user:"occ_user", collapsed:"occ_collapsed" };

/* ---- Constants ------------------------------------------------------------- */
const DEPARTMENTS = ["Sales","Managers","Marketing","Operations","Finance","Admin","Personal"];
const DEPT_COLOR = {

const STATUSES = ["To Do","In Progress","Stuck","For Approval","Completed/Approved"];

  "To Do":"s-todo","In Progress":"s-prog","Stuck":"s-block",
  "For Approval":"s-approval","Completed/Approved":"s-done"

const DONE_STATUS = "Completed/Approved";
/* Map any legacy status/cadence values (from older tasks) to the current set. */
function mapStatus(s){
  if(s==="Waiting on Someone"||s==="Blocked") return "Stuck";
  if(s==="Done"||s==="Recurring Done Today"||s==="Completed") return DONE_STATUS;
  return STATUSES.includes(s) ? s : "To Do";
}
function mapCadence(c){ if(!c || c==="None") return "One Off"; return c; }
function isDone(t){ return t.status===DONE_STATUS; }
function isRecurring(t){ return ["Daily","Weekly","Bi-Weekly","Monthly"].includes(t.cadence); }
/* A task is "completed/archived" once finished — kept in Supabase for history but
   hidden from the active board. Old completed tasks (no archived flag) still count
   as completed via their status. "Active" = everything not completed/archived. */
function isCompleted(t){ return t.archived===true || isDone(t); }
function isActive(t){ return !isCompleted(t); }

const $ = s => document.querySelector(s);
function isAdmin(){ return ADMINS.includes((state.user||"").trim().toLowerCase()); }
function requireAdmin(){
  if(isAdmin()) return true;

const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
function initials(name){ return (name||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?"; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }

function dueDateTime(t){ if(!t.dueDate) return null; return new Date(t.dueDate + "T" + (t.dueTime || "23:59")); }
function startDateTime(t){ if(!t.startDate) return null; return new Date(t.startDate + "T" + (t.startTime || "00:00")); }
function isOverdue(t){
  if(isDone(t) || t.status==="For Approval") return false;
  const d = dueDateTime(t); if(!d) return false;
  return d.getTime() < Date.now();
}
function isDueToday(t){
  const d = dueDateTime(t); if(!d) return false;
  const n=new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}
function daysSinceUpdate(t){ if(!t.lastUpdate) return Infinity; return (Date.now() - new Date(t.lastUpdate).getTime())/86400000; }
function fmtDateTime(dateStr, timeStr){
  if(!dateStr) return "—";
  const d = new Date(dateStr+"T"+(timeStr||"00:00"));
  const date = d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
  if(!timeStr) return date;
  const time = d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  return date+" · "+time;
}
function fmtTime(timeStr){ return timeStr? new Date('2000-01-01T'+timeStr).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}) : ''; }
function fmtFull(d){ return d? new Date(d).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "—"; }
function todayStr(){ const n=new Date(); return new Date(n.getTime()-n.getTimezoneOffset()*60000).toISOString().slice(0,10); }
function timeAgo(iso){
  const m=Math.floor((Date.now()-new Date(iso))/60000);
  if(m<1) return "just now"; if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); return d+"d ago";
}

  if(!state.cfg.team || !state.cfg.team.length) state.cfg.team = DEFAULT_TEAM.slice();
  // Ensure the six managers always exist so their emails can be entered.
  MANAGERS.forEach(mn=>{ if(!state.cfg.team.some(m=>m.name===mn)) state.cfg.team.push({name:mn, department:"Managers", role:"Manager", email:"", phone:""}); });
  if(!state.cfg.supabaseUrl) state.cfg.supabaseUrl = DEFAULT_SUPABASE_URL;
  if(!state.cfg.supabaseAnon) state.cfg.supabaseAnon = DEFAULT_SUPABASE_ANON;
  if(!state.cfg.emailEndpoint || state.cfg.emailEndpoint==="/api/notify") state.cfg.emailEndpoint = "/api/send-email";
  if(!state.cfg.reminderLeadMin) state.cfg.reminderLeadMin = 120;
  state.user = localStorage.getItem(LS.user) || "";
  try{ state.collapsed = JSON.parse(localStorage.getItem(LS.collapsed)||"{}"); }catch(e){ state.collapsed={}; }

async function connect(){
  const {supabaseUrl, supabaseAnon} = state.cfg;
  if(window.supabase && supabaseUrl && supabaseAnon){
    try{
      state.sb = window.supabase.createClient(supabaseUrl, supabaseAnon);
      const {error} = await state.sb.from("tasks").select("id").limit(1);
      if(error) throw error;
      state.mode = "live";
      return;
    }catch(e){ console.warn("Supabase unavailable, using demo mode:", e.message||e); }
  }
  state.mode = "demo"; state.sb = null;
}

async function loadTasks(){
  if(state.mode==="live" && state.sb){
    const {data, error} = await state.sb.from("tasks").select("*");
    if(error){ console.warn(error); state.mode="demo"; return loadTasks(); }
    state.tasks = (data||[])
      .filter(r => r.id !== "__settings__" && r.data && typeof r.data==="object")
      .map(r => ({...r.data, id:r.id}));
    const cfgRow = (data||[]).find(r=>r.id==="__settings__");
    if(cfgRow && cfgRow.data){
      // Note: emailEndpoint is intentionally NOT loaded — the endpoint is a fixed
      // code constant (EMAIL_ENDPOINT). Older saved settings may contain a stale
      // value (e.g. /api/notify); ignoring it prevents calling a dead endpoint.
      ["reminderLeadMin","team"].forEach(k=>{
        if(cfgRow.data[k]!=null) state.cfg[k]=cfgRow.data[k];
      });
      MANAGERS.forEach(mn=>{ if(!state.cfg.team.some(m=>m.name===mn)) state.cfg.team.push({name:mn, department:"Managers", role:"Manager", email:"", phone:""}); });
    }
  }else{
    try{ state.tasks = JSON.parse(localStorage.getItem(LS.demo)||"[]"); }catch(e){ state.tasks=[]; }
  }
  // Normalize any legacy status/cadence values so old tasks work with the new set.
  state.tasks.forEach(t=>{ t.status=mapStatus(t.status); t.cadence=mapCadence(t.cadence); });
}

/* Stamp owner/manager emails onto the task so any consumer (the Apps Script
   notifier, or the cron) can address both without a directory lookup. */
function stampContacts(t){
  const o = contactFor(t.owner), m = contactFor(t.manager);
  t.ownerEmail = (o && o.email) || "";
  t.managerEmail = (m && m.email) || "";
}
async function persistTask(t){
  stampContacts(t);
  t.updatedAt = new Date().toISOString();
  if(state.mode==="live" && state.sb){
    const {error} = await state.sb.from("tasks").upsert(
      {id:t.id, data:t, updated_at:t.updatedAt}, {onConflict:"id"});
    if(error){ console.warn("save failed",error); toast("Save failed — check connection"); }
  }else{
    localStorage.setItem(LS.demo, JSON.stringify(state.tasks));
  }
}
async function deleteTaskRemote(id){
  if(state.mode==="live" && state.sb){
    const {error} = await state.sb.from("tasks").delete().eq("id", id);
    if(error) console.warn(error);
  }else{
    localStorage.setItem(LS.demo, JSON.stringify(state.tasks));
  }
}

  const shared = {
    reminderLeadMin: state.cfg.reminderLeadMin,
    team: state.cfg.team

/* ---- Email notifications (Resend serverless function) --------------------- */
/* Emails are sent by the serverless function /api/send-email (which holds the
   email-provider API key). The browser posts the recipient(s) + task fields; the
   function builds and delivers the message. Owner/manager emails come from the
   team directory (and are also stamped on each task as ownerEmail/managerEmail).
   Sending happens on: assignment (owner), due-soon + overdue (owner + cc manager),
   and "For Approval" (manager). Repeat sends are prevented via the notif flags. */
function taskEmailFields(task){
  return {
    name: task.name, owner: task.owner, manager: task.manager,
    department: task.department, priority: task.priority, status: task.status,
    start: fmtDateTime(task.startDate, task.startTime),
    due: fmtDateTime(task.dueDate, task.dueTime),
    notes: task.notes || "",
    attachment: (task.attachments && task.attachments[0] && (task.attachments[0].url||"")) || "",
    link: location.origin + location.pathname
  };
}
const EMAIL_ENDPOINT = "/api/send-email";   // serverless email function (Resend)
const sleep = ms => new Promise(r=>setTimeout(r,ms));
/* All email sends are serialized through one gate with ~650ms spacing so we
   never exceed Resend's free-tier limit of 2 requests/second. */
let _emailGate = Promise.resolve();
function emailRequest(payload){
  const run = _emailGate.then(()=> fetch(EMAIL_ENDPOINT, {
    method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload)}));
  _emailGate = run.then(()=>sleep(650), ()=>sleep(650));   // pace the next send
  return run;
}
async function postEmail(payload){
  try{ const r = await emailRequest(payload); return r.ok; }
  catch(e){ console.warn("Email send failed:", e.message||e); return false; }
}
/* event: "assigned" | "almost_due" | "overdue" | "approval" | "test" */
async function sendEmail(task, kind, event){
  const owner = contactFor(task.owner);
  const manager = contactFor(task.manager);
  const ownerEmail = (owner && owner.email) || task.ownerEmail || "";
  const managerEmail = (manager && manager.email) || task.managerEmail || "";
  let to = ownerEmail, cc = "";
  if(event==="almost_due" || event==="overdue") cc = managerEmail;
  if(event==="approval"){ to = managerEmail; cc = ""; }   // approval goes to the manager
  if(!to){ console.warn("No recipient email for", event, task.name); return false; }
  return await postEmail({ to, cc, kind, event, task: taskEmailFields(task) });
}

function ensureNotif(t){
  if(!t.notif) t.notif = {assigned:false, almost:false, overdue:false, approval:false, lastOwner:t.owner||""};
  if(t.notif.approval===undefined) t.notif.approval=false;
  return t.notif;
}

async function notifyAssigned(t, reason){
  const n = ensureNotif(t);
  if(!t.owner) return;
  if(reason==="created" && n.assigned) return;
  const ok = await sendEmail(t, "Task Assigned", "assigned");
  if(ok){ n.assigned = true; n.lastOwner = t.owner; }
}

/* Email the manager once when a task enters "For Approval". */
async function notifyApproval(t){
  const n = ensureNotif(t);
  if(t.status!=="For Approval" || n.approval) return;
  const ok = await sendEmail(t, "Task Ready For Approval", "approval");
  if(ok) n.approval = true;
}

/* Periodic scan for due-soon (2h) + overdue notifications (prevents repeats) */
async function notificationScan(){
  const lead = (state.cfg.reminderLeadMin||120) * 60000;
  let changed=false;
  for(const t of state.tasks){
    if(isDone(t)||t.status==="For Approval") continue;
    const d = dueDateTime(t); if(!d) continue;
    const n = ensureNotif(t);
    const ms = d.getTime() - Date.now();
    if(ms <= 0){
      if(!n.overdue){ const ok=await sendEmail(t,"Task Overdue","overdue"); if(ok){n.overdue=true; changed=true; await persistTask(t);} }
    }else if(ms <= lead){
      if(!n.almost){ const ok=await sendEmail(t,"Task Due Soon","almost_due"); if(ok){n.almost=true; changed=true; await persistTask(t);} }
    }
  }
  if(changed) render();
}

/* ---- Task operations ------------------------------------------------------- */
function blankTask(){
  return {
    id:uid(), name:"", owner:"", manager:"", department:"Operations",
    priority:"Normal", status:"To Do", requiresApproval:false,
    startDate:todayStr(), startTime:"09:00", dueDate:todayStr(), dueTime:"17:00",
    cadence:"One Off", lastUpdate:new Date().toISOString(), notes:"",
    links:[], attachments:[], comments:[], checklist:[], activity:[],
    notif:{assigned:false,almost:false,overdue:false,approval:false,lastOwner:""},
    createdAt:new Date().toISOString(), completedAt:null
  };
}
function addActivity(t, text){ (t.activity = t.activity||[]).unshift({ts:new Date().toISOString(), text, by:state.user||"Someone"}); }

async function saveTask(t, {isNew}={}){
  const existing = state.tasks.find(x=>x.id===t.id);
  const prevOwner = existing ? existing.owner : null;
  const prevStatus = existing ? existing.status : null;
  t.lastUpdate = new Date().toISOString();
  if(isNew){ addActivity(t, "Task created"); state.tasks.push(t); }
  else { Object.assign(existing, t); t = existing; }
  const n = ensureNotif(t);
  // Re-arm the "For Approval" email if the task was re-opened to an active state.
  if(t.status!=="For Approval" && !isDone(t)) n.approval=false;
  await persistTask(t);
  if(isNew && t.owner){ await notifyAssigned(t, "created"); await persistTask(t); }
  else if(!isNew && t.owner && t.owner!==prevOwner){
    n.assigned=false; await notifyAssigned(t,"changed"); await persistTask(t);
  }
  // Email the manager when a task enters "For Approval".
  if(t.status==="For Approval" && prevStatus!=="For Approval"){ await notifyApproval(t); await persistTask(t); }
  render();
}

/* Build the next recurring occurrence. Dates are shifted from the ORIGINAL
   scheduled start/due dates (t.startDate / t.dueDate), never from the completion
   time, so the schedule pattern is preserved. Times carry over unchanged. */
function nextOccurrence(t){
  const clone = JSON.parse(JSON.stringify(t));
  clone.id = uid();
  // Reset everything that is specific to a single instance.
  clone.status = "To Do";
  clone.archived = false;
  clone.completedAt = null;
  clone.completedBy = "";
  clone.completionType = null;
  clone.attachments = [];                 // new instance starts without a file
  clone.lastUpdate = new Date().toISOString();
  clone.createdAt = new Date().toISOString();
  clone.comments = []; clone.activity = [];
  delete clone._spawned;
  clone.notif = {assigned:false, almost:false, overdue:false, approval:false, lastOwner:t.owner||""};
  (clone.checklist||[]).forEach(c=>c.done=false);   // keep checklist template, unticked
  const shift = (dateStr, unit)=>{
    if(!dateStr) return dateStr;
    const d = new Date(dateStr+"T00:00");
    if(unit==="Daily") d.setDate(d.getDate()+1);
    else if(unit==="Weekly") d.setDate(d.getDate()+7);
    else if(unit==="Bi-Weekly") d.setDate(d.getDate()+14);
    else if(unit==="Monthly") d.setMonth(d.getMonth()+1);
    return d.toISOString().slice(0,10);
  };
  clone.startDate = shift(t.startDate, t.cadence);
  clone.dueDate   = shift(t.dueDate, t.cadence);
  // carries over: name, owner, manager, department, priority, cadence,
  // requiresApproval, notes, checklist (unticked), start time, due time.
  addActivity(clone, "Recurring task created");
  return clone;
}

async function markDone(t){
  // Approval workflow: an approval-required task is first submitted "For Approval"
  // (which emails the manager); the manager then marks it Completed/Approved.
  if(t.requiresApproval && t.status!=="For Approval" && !isDone(t)){
    return submitForApproval(t);
  }
  const recurring = isRecurring(t);   // One Off does not spawn a next task
  const alreadySpawned = t._spawned;
  // Archive the completed instance — kept in Supabase for reporting/history,
  // hidden from the active board.
  t.status = DONE_STATUS;
  t.archived = true;
  t.completedAt = new Date().toISOString();
  t.completedBy = state.user || "";
  t.completionType = recurring ? "recurring_completed" : "one_off_completed";
  t.lastUpdate = new Date().toISOString();
  addActivity(t, "Completed/Approved");
  if(recurring && !alreadySpawned){
    t._spawned = true;
    await persistTask(t);
    const next = nextOccurrence(t);
    state.tasks.push(next);
    await persistTask(next);
    if(next.owner){ await notifyAssigned(next,"created"); await persistTask(next); }
    toast(`Completed · next ${t.cadence.toLowerCase()} task created for ${fmtDateTime(next.dueDate,next.dueTime)}`);
  }else{
    await persistTask(t);
    toast("Task completed & archived");
  }
  render();
}

/* Update a task's status (allowed for everyone). Routes Done / For Approval
   through the existing workflow so approval emails + recurring spawn still run. */
async function changeStatus(t, s){
  if(!s || s===t.status) return;
  if(s===DONE_STATUS) return markDone(t);
  if(s==="For Approval") return submitForApproval(t);
  t.status = s;
  t.lastUpdate = new Date().toISOString();
  const n = ensureNotif(t);
  n.approval = false;                 // re-armed if it later goes to approval again
  addActivity(t, "Status changed to "+s);
  await persistTask(t);
  toast("Status updated to "+s);
  render();
}

/* Owner submits an approval-required task; emails the manager for review. */
async function submitForApproval(t){
  t.status = "For Approval";
  t.lastUpdate = new Date().toISOString();
  ensureNotif(t).approval = false;
  addActivity(t, "Submitted for approval");
  await persistTask(t);
  await notifyApproval(t);
  await persistTask(t);
  const mgr = contactFor(t.manager);
  toast(mgr && mgr.email ? `Sent to ${t.manager||'manager'} for approval` : "Marked For Approval (add the manager's email in Settings to notify)");
  render();
}

async function deleteTask(id){
  if(!requireAdmin()) return;
  if(!confirm("Delete this task? This cannot be undone.")) return;
  state.tasks = state.tasks.filter(t=>t.id!==id);
  await deleteTaskRemote(id);
  if(state.drawer && state.drawer.id===id) state.drawer=null;
  toast("Task deleted"); render();
}

}

function quickText(t){

  window.location.href = `sms:${num}?&body=${body}`;

async function moveDueDate(t){
  if(!requireAdmin()) return;
  const nd = prompt("New due date (YYYY-MM-DD):", t.dueDate||todayStr());
  if(!nd) return;
  const nt = prompt("New due time (HH:MM, 24h):", t.dueTime||"17:00");
  t.dueDate = nd; if(nt) t.dueTime = nt;
  ensureNotif(t).almost=false; t.notif.overdue=false;
  addActivity(t, `Due date moved to ${fmtDateTime(t.dueDate,t.dueTime)}`);
  await persistTask(t); toast("Due date updated"); render();
}

/* ---- Filtering / sorting --------------------------------------------------- */
/* True when the user is explicitly viewing completed/archived tasks. */
function showingCompleted(){
  return state.chip==="completed" || state.dash==="completedWeek" || state.filt.status===DONE_STATUS;
}
function visibleTasks(){
  let list = state.tasks.slice();
  const f = state.filt, q = state.search.trim().toLowerCase();

  if(q) list = list.filter(t =>
    (t.name||"").toLowerCase().includes(q) ||
    (t.owner||"").toLowerCase().includes(q) ||
    (t.notes||"").toLowerCase().includes(q) ||
    (t.department||"").toLowerCase().includes(q));

  // The active board shows only active tasks; completed/archived tasks appear
  // only when the Completed view (chip, dashboard card, or status filter) is on.
  if(!showingCompleted()) list = list.filter(isActive);

  switch(state.chip){
    case "my": list=list.filter(t=>t.owner===state.user); break;
    case "overdue": list=list.filter(isOverdue); break;
    case "today": list=list.filter(isDueToday); break;
    case "stuck": list=list.filter(t=>t.status==="Stuck"); break;
    case "approval": list=list.filter(t=>t.status==="For Approval"); break;
    case "completed": list=list.filter(isCompleted); break;
    case "recurring": list=list.filter(isRecurring); break;
  }
  switch(state.dash){
    case "active": list=list.filter(isActive); break;
    case "overdue": list=list.filter(isOverdue); break;
    case "today": list=list.filter(isDueToday); break;
    case "stuck": list=list.filter(t=>t.status==="Stuck"); break;
    case "approval": list=list.filter(t=>t.status==="For Approval"); break;
    case "completedWeek": list=list.filter(isCompletedThisWeek); break;
  }
  if(f.department) list=list.filter(t=>t.department===f.department);
  if(f.owner) list=list.filter(t=>t.owner===f.owner);
  if(f.manager) list=list.filter(t=>t.manager===f.manager);
  if(f.priority) list=list.filter(t=>t.priority===f.priority);
  if(f.cadence) list=list.filter(t=>t.cadence===f.cadence);
  if(f.status) list=list.filter(t=>t.status===f.status);

  list.sort((a,b)=>{
    const da=dueDateTime(a), db=dueDateTime(b);
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1;
    return da-db;
  });
  return list;
}
function isCompletedThisWeek(t){
  if(!isDone(t)) return false;
  if(!t.completedAt) return false;
  const now=new Date(); const day=now.getDay(); const monday=new Date(now);
  monday.setDate(now.getDate()-((day+6)%7)); monday.setHours(0,0,0,0);
  return new Date(t.completedAt) >= monday;
}
function ownersList(){ return [...new Set(state.tasks.map(t=>t.owner).filter(Boolean).concat((state.cfg.team||[]).map(m=>m.name)))].sort(); }
function managersList(){ return [...new Set([...MANAGERS, ...state.tasks.map(t=>t.manager).filter(Boolean)])]; }

function statusPill(s){ return `<span class="stat ${STATUS_CLASS[s]||'s-todo'}">${esc(s)}</span>`; }
/* A status dropdown styled as a colored badge. Changing it saves immediately. */
function statusSelect(t){

}
function prPill(p){ return `<span class="pr pr-${p}">${esc(p)}</span>`; }
function ownerAv(name){ const c=contactFor(name); const dep=c?c.department:null;
  return `<span class="avatar" style="width:24px;height:24px;font-size:10px;${dep?`background:${DEPT_COLOR[dep]};color:#10131a;border-color:transparent`:''}">${esc(initials(name||'?'))}</span>`; }

function filterBar(){
  const chip=(k,l)=>`<span class="chip ${state.chip===k?'active':''}" data-chip="${k}">${l}</span>`;
  const sel=(key,label,opts)=>`<select class="f" data-filt="${key}"><option value="">${label}</option>${
    opts.map(o=>`<option ${state.filt[key]===o?'selected':''}>${esc(o)}</option>`).join("")}</select>`;

    ${chip("all","All")}${chip("my","My Tasks")}${chip("overdue","Overdue")}${chip("today","Due Today")}

    ${sel("owner","Owner",ownersList())}
    ${sel("manager","Manager",managersList())}
    ${sel("priority","Priority",PRIORITIES)}
    ${sel("cadence","Cadence",CADENCES)}
    ${sel("status","Status",STATUSES)}

function taskRow(t){

    ? `<div class="due ${od?'overdue-txt':''}"><span>${fmtDateTime(t.dueDate,'')}</span><span class="tm">${fmtTime(t.dueTime)}${od?' · overdue':''}</span></div>`
    : '<span style="color:var(--muted2)">—</span>';
  const start = t.startDate
    ? `<div class="due"><span>${fmtDateTime(t.startDate,'')}</span><span class="tm">${fmtTime(t.startTime)}</span></div>`
    : '<span style="color:var(--muted2)">—</span>';
  return `<tr data-open="${t.id}">
    <td><div class="tname">${esc(t.name)}${od?' <span class="overdue-txt">●</span>':''}${t.requiresApproval?' <span title="Requires approval">🛡️</span>':''}${(t.attachments&&t.attachments.length)?` <a href="${esc(t.attachments[0].url||'#')}" target="_blank" rel="noreferrer" title="${esc(t.attachments[0].name||'Attachment')}" onclick="event.stopPropagation()">📎</a>`:''}<div class="od">${esc(t.department)}</div></div></td>
    <td><div class="ownercell">${ownerAv(t.owner)}<span>${esc(t.owner||'—')}</span></div></td>
    <td>${esc(t.manager||'—')}</td>
    <td>${prPill(t.priority)}</td>
    <td>${start}</td>
    <td>${due}</td>
    <td>${isRecurring(t)?`<span class="pill" style="background:var(--card2);border-color:var(--border)">↻ ${esc(t.cadence)}</span>`:'<span style="color:var(--muted2)">One Off</span>'}</td>
    <td><div data-stop="1">${statusSelect(t)}</div></td>
    <td><div data-stop="1">${fileCell(t)}</div></td>
    <td style="color:var(--muted)">${t.lastUpdate?timeAgo(t.lastUpdate):'—'}</td>
    <td>
      <div class="rowact" data-stop="1">
        <button class="micro go" title="Mark done" data-act="done" data-id="${t.id}">✓</button>
        ${isAdmin()?`
        <button class="micro" title="Ask for update" data-act="ask" data-id="${t.id}">💬</button>
        <button class="micro" title="Edit" data-act="edit" data-id="${t.id}">✎</button>
        <button class="micro del" title="Delete" data-act="del" data-id="${t.id}">🗑</button>`:''}

}
/* Board "File" column cell. Click "Attachment" (or "Edit Attachment") to add or
   update a file link in a small popup — no need to open the whole task. */
function fileCell(t){
  const a = (t.attachments && t.attachments[0]) || null;
  if(a && a.url) return `<div style="display:flex;gap:6px;align-items:center">`+
    `<a class="btn sm" href="${esc(a.url)}" target="_blank" rel="noreferrer" title="${esc(a.name||a.url)}" onclick="event.stopPropagation()">📎 Open File</a>`+
    `<button class="btn sm" data-attach="${t.id}" title="Edit attachment">✎ Edit</button></div>`;
  return `<button class="btn sm" data-attach="${t.id}" title="Add a file/attachment link">＋ Attachment</button>`;
}

function boardTable(tasks){
  if(!tasks.length) return `<div class="empty">No tasks match the current filters.</div>`;
  return `<div style="overflow-x:auto"><table>
    <thead><tr>
      <th>Task</th><th>Owner</th><th>Manager</th><th>Priority</th>
      <th>Start</th><th>Due</th><th>Cadence</th><th>Status</th><th>File</th><th>Last Update</th><th>Actions</th>
    </tr></thead>

}

/* ---- Dashboard ------------------------------------------------------------- */
function viewDashboard(){
  const active = state.tasks.filter(isActive).length;
  const overdue = state.tasks.filter(t=>isActive(t)&&isOverdue(t)).length;
  const today = state.tasks.filter(t=>isActive(t)&&isDueToday(t)).length;
  const stuckN = state.tasks.filter(t=>t.status==="Stuck").length;
  const approvalN = state.tasks.filter(t=>t.status==="For Approval").length;
  const doneWk = state.tasks.filter(isCompletedThisWeek).length;
  const kpi=(key,val,label,danger,acc)=>`
    <div class="kpi ${state.dash===key?'active':''} ${danger?'danger':''}" data-dash="${key}">
      <div class="acc" style="background:${acc}"></div>
      <div class="v">${val}</div><div class="l">${label}</div>
    </div>`;
  const hour=new Date().getHours();
  const greet = hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  const stuck = stuckTasks();
  return `
    <div class="page-head">
      <div><h1>${greet}${state.user?', '+esc(state.user):''}</h1>
      <div class="sub">${new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})} · Click a card to filter.</div></div>
    </div>
    <div class="kpis">
      ${kpi("active",active,"Active Tasks",false,"var(--accent)")}
      ${kpi("overdue",overdue,"Overdue",true,"var(--red)")}
      ${kpi("today",today,"Due Today",false,"var(--d-sales)")}
      ${kpi("stuck",stuckN,"Stuck",stuckN>0,"var(--red)")}
      ${kpi("approval",approvalN,"For Approval",false,"var(--d-sales)")}
      ${kpi("completedWeek",doneWk,"Completed This Week",false,"var(--d-finance)")}
    </div>
    ${state.dash?`<div class="filters"><span class="chip active">Filtered: ${esc(dashLabel())}</span><button class="btn sm" id="clearDash">✕ Show all tasks</button></div>`:''}
    <div class="grid2">
      <div class="card sect">
        <h2>${state.dash?'Filtered Tasks':'Upcoming Tasks'} <span class="cnt">${visibleTasks().length}</span></h2>
        ${boardTable(state.dash?visibleTasks():visibleTasks().slice(0,12))}
      </div>
      <div class="card sect">
        <h2>⚠ Stuck Tasks <span class="cnt">${stuck.length}</span></h2>
        <div class="sub" style="margin:-6px 0 12px;color:var(--muted2)">No update 3+ days · past due · or marked Stuck</div>
        ${stuck.length?stuck.map(t=>`
          <div class="linkrow" data-open="${t.id}" style="cursor:pointer;border-bottom:1px solid var(--border)">
            ${ownerAv(t.owner)}
            <div style="flex:1;min-width:0">
              <div class="tname" style="font-size:13px">${esc(t.name)}</div>
              <div class="od">${esc(t.owner||'Unassigned')} · ${stuckReason(t)}</div>
            </div>
            ${statusPill(t.status)}
          </div>`).join(""):'<div class="empty">Nothing stuck. 🎉</div>'}
      </div>
    </div>`;
}
function dashLabel(){ return {active:"Active Tasks",overdue:"Overdue",today:"Due Today",stuck:"Stuck",approval:"For Approval",completedWeek:"Completed This Week"}[state.dash]||""; }
function stuckTasks(){
  return state.tasks.filter(t=>{
    if(isDone(t)) return false;
    return t.status==="Stuck" || isOverdue(t) || daysSinceUpdate(t)>=3;
  }).sort((a,b)=>(dueDateTime(a)||9e15)-(dueDateTime(b)||9e15));
}
function stuckReason(t){
  if(t.status==="Stuck") return "marked stuck";
  if(isOverdue(t)) return "past due";
  if(daysSinceUpdate(t)>=3) return "no update "+Math.floor(daysSinceUpdate(t))+"d";
  return "stuck";
}
function bindDash(c){
  c.querySelectorAll("[data-dash]").forEach(el=>el.onclick=()=>{
    state.dash = state.dash===el.dataset.dash ? null : el.dataset.dash; render();
  });
  const cd=$("#clearDash"); if(cd) cd.onclick=()=>{ state.dash=null; render(); };
}

/* ---- Tasks Board (collapsible department sections) ------------------------- */
function viewBoard(){
  const list = visibleTasks();
  const byDept = {};
  DEPARTMENTS.forEach(d=>byDept[d]=[]);
  list.forEach(t=>{ (byDept[t.department]=byDept[t.department]||[]).push(t); });
  const sections = DEPARTMENTS.filter(d=>byDept[d] && byDept[d].length).map(d=>{
    const tasks=byDept[d];
    const members=[...new Set(tasks.map(t=>t.owner).filter(Boolean))];
    const collapsed = state.collapsed[d] ? "collapsed":"";
    return `<div class="deptsec">
      <div class="dephead ${collapsed}" data-dept="${esc(d)}">
        <div class="bar" style="background:${DEPT_COLOR[d]}"></div>
        <div class="dn">${esc(d)}</div>
        <div class="dc">${tasks.length} task${tasks.length!==1?'s':''}</div>
        <div class="mem">${members.slice(0,6).map(m=>`<span class="av" style="background:${DEPT_COLOR[d]}" title="${esc(m)}">${esc(initials(m))}</span>`).join("")}</div>
        <div class="car">▾</div>
      </div>
      ${collapsed?'':boardTable(tasks)}
    </div>`;
  }).join("");
  return `<div class="page-head"><div><h1>Tasks Board</h1><div class="sub">Centralized board grouped by department · ${list.length} tasks</div></div></div>
    ${filterBar()}
    ${sections||'<div class="empty">No tasks yet. Click “New Task” or load a template.</div>'}`;
}

function bindBoard(c){
  c.querySelectorAll("[data-chip]").forEach(el=>el.onclick=()=>{ state.chip=el.dataset.chip; state.dash=null; render(); });
  c.querySelectorAll("[data-filt]").forEach(el=>el.onchange=()=>{ state.filt[el.dataset.filt]=el.value; render(); });
  const cf=$("#clearFilters"); if(cf) cf.onclick=()=>{ state.chip="all"; state.filt={department:"",owner:"",manager:"",priority:"",cadence:"",status:""}; state.dash=null; render(); };
  c.querySelectorAll("[data-dept]").forEach(el=>el.onclick=()=>{
    const d=el.dataset.dept; state.collapsed[d]=!state.collapsed[d];
    localStorage.setItem(LS.collapsed,JSON.stringify(state.collapsed)); renderContent();
  });
  c.querySelectorAll("[data-open]").forEach(el=>el.onclick=(e)=>{
    if(e.target.closest("[data-stop]")) return;
    state.drawer={type:"task", id:el.dataset.open}; renderDrawer();
  });
  c.querySelectorAll("[data-act]").forEach(el=>el.onclick=(e)=>{
    e.stopPropagation();
    const t=state.tasks.find(x=>x.id===el.dataset.id); if(!t) return;
    const a=el.dataset.act;
    if(a==="done") markDone(t);
    else if(a==="ask") quickAskUpdate(t);
    else if(a==="edit") openTaskModal(t);
    else if(a==="del") deleteTask(t.id);
  });
  // Inline status dropdown — saves immediately on change.
  c.querySelectorAll("[data-statussel]").forEach(el=>{
    el.onclick=(e)=>e.stopPropagation();
    el.onchange=()=>{ const t=state.tasks.find(x=>x.id===el.dataset.statussel); if(t) changeStatus(t, el.value); };
  });
  // Inline attachment popup — add/edit a file link without opening the task.
  c.querySelectorAll("[data-attach]").forEach(el=>el.onclick=(e)=>{ e.stopPropagation(); openAttachmentModal(el.dataset.attach); });
}

/* ---- Recurring ------------------------------------------------------------- */
function viewRecurring(){
  const rec = state.tasks.filter(t=>isRecurring(t) && isActive(t))
    .sort((a,b)=>(dueDateTime(a)||9e15)-(dueDateTime(b)||9e15));
  const groups = {Daily:[],Weekly:[],"Bi-Weekly":[],Monthly:[]};
  rec.forEach(t=>{ (groups[t.cadence]||(groups[t.cadence]=[])).push(t); });
  return `<div class="page-head"><div><h1>Recurring Tasks</h1>
    <div class="sub">When completed, the next occurrence is created automatically at the same start &amp; due time. "One Off" tasks do not repeat.</div></div></div>
    ${["Daily","Weekly","Bi-Weekly","Monthly"].map(g=>`
      <div class="card sect" style="margin-bottom:14px">
        <h2>↻ ${g} <span class="cnt">${groups[g].length}</span></h2>
        ${groups[g].length?boardTable(groups[g]):'<div class="empty">No '+g.toLowerCase()+' recurring tasks.</div>'}
      </div>`).join("")}`;
}

/* ---- Reports --------------------------------------------------------------- */
function viewReports(){
  const weeks=[]; const now=new Date();
  for(let i=5;i>=0;i--){ const m=new Date(now); m.setDate(now.getDate()-((now.getDay()+6)%7)-7*i); m.setHours(0,0,0,0); weeks.push(m); }
  const wkCounts=weeks.map(wkStart=>{
    const wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+7);
    const n=state.tasks.filter(t=>t.completedAt && new Date(t.completedAt)>=wkStart && new Date(t.completedAt)<wkEnd).length;
    return {label:wkStart.toLocaleDateString(undefined,{month:'short',day:'numeric'}), n};
  });
  const odTrend=weeks.map(wkStart=>{
    const wkEnd=new Date(wkStart); wkEnd.setDate(wkStart.getDate()+7);
    const n=state.tasks.filter(t=>{ const d=dueDateTime(t); return d&&d>=wkStart&&d<wkEnd && !isDone(t) && d<new Date(); }).length;
    return {label:wkStart.toLocaleDateString(undefined,{month:'short',day:'numeric'}), n};
  });
  const byDept=DEPARTMENTS.map(d=>({label:d,n:state.tasks.filter(t=>t.department===d).length,color:DEPT_HEX[d]}));
  const owners=ownersList().map(o=>({label:o,n:state.tasks.filter(t=>t.owner===o).length})).filter(x=>x.n).sort((a,b)=>b.n-a.n).slice(0,10);
  const recTotal=state.tasks.filter(isRecurring).length;
  const recDone=state.tasks.filter(t=>isRecurring(t)&&isDone(t)).length;
  const recRate=recTotal?Math.round(recDone/recTotal*100):0;
  const stuckN=state.tasks.filter(t=>t.status==="Stuck").length;

  // Completed/archived tasks (kept in Supabase) for completion reporting.
  const completed=state.tasks.filter(isCompleted).sort((a,b)=>new Date(b.completedAt||0)-new Date(a.completedAt||0));
  const tally=(keyFn)=>{ const m={}; completed.forEach(t=>{ const k=keyFn(t)||"—"; m[k]=(m[k]||0)+1; }); return Object.entries(m).map(([label,n])=>({label,n})).sort((a,b)=>b.n-a.n).slice(0,12); };
  const compByOwner=tally(t=>t.owner);
  const compByDept=tally(t=>t.department);
  const compByManager=tally(t=>t.manager);
  const compByCadence=tally(t=>t.cadence);

  const bars=(arr,colorFn)=>{ const max=Math.max(1,...arr.map(a=>a.n)); return (arr.length?arr:[{label:'—',n:0}]).map(a=>`
    <div class="bar-row"><div class="bl" title="${esc(a.label)}">${esc(a.label)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${a.n?Math.max(a.n/max*100,6):0}%;background:${colorFn?colorFn(a):'var(--accent)'}">${a.n||''}</div></div></div>`).join(""); };

  const fileLink=t=>{ const a=(t.attachments&&t.attachments[0]); return (a&&a.url)?`<a href="${esc(a.url)}" target="_blank" rel="noreferrer">file</a>`:'—'; };
  const completedRows=completed.slice(0,200).map(t=>`<tr>
    <td>${esc(t.name)}</td><td>${esc(t.owner||'—')}</td><td>${esc(t.manager||'—')}</td><td>${esc(t.department)}</td>
    <td>${esc(t.cadence||'—')}</td><td>${t.completedAt?fmtFull(t.completedAt):'—'}</td>
    <td>${esc(t.completedBy||'—')}</td><td>${esc(fmtDateTime(t.startDate,t.startTime))}</td>
    <td>${esc(fmtDateTime(t.dueDate,t.dueTime))}</td><td>${t.lastUpdate?fmtFull(t.lastUpdate):'—'}</td><td>${fileLink(t)}</td>
  </tr>`).join("");

  return `<div class="page-head"><div><h1>Reports</h1><div class="sub">Live metrics across the board</div></div></div>
  <div class="rep-grid">
    <div class="card sect"><h2>Completed Tasks by Week</h2>${bars(wkCounts,()=>'var(--d-finance)')}</div>
    <div class="card sect"><h2>Overdue Task Trend</h2>${bars(odTrend,()=>'var(--red)')}</div>
    <div class="card sect"><h2>Tasks by Department</h2>${bars(byDept,a=>a.color)}</div>
    <div class="card sect"><h2>Tasks by Owner</h2>${owners.length?bars(owners,()=>'var(--d-marketing)'):'<div class="empty">No owners yet.</div>'}</div>
    <div class="card sect"><h2>Completed by Owner</h2>${bars(compByOwner,()=>'var(--d-finance)')}</div>
    <div class="card sect"><h2>Completed by Department</h2>${bars(compByDept,a=>DEPT_HEX[a.label]||'var(--d-finance)')}</div>
    <div class="card sect"><h2>Completed by Manager</h2>${bars(compByManager,()=>'var(--d-managers)')}</div>
    <div class="card sect"><h2>Completed by Cadence</h2>${bars(compByCadence,()=>'var(--d-operations)')}</div>
    <div class="card sect"><h2>Recurring Completion Rate</h2>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="font-size:40px;font-weight:800;color:var(--d-finance)">${recRate}%</div>
        <div class="sub">${recDone} of ${recTotal} recurring tasks completed this cycle.</div>
      </div>
      <div class="bar-track" style="margin-top:12px"><div class="bar-fill" style="width:${recRate}%;background:var(--d-finance)"></div></div>
    </div>
    <div class="card sect"><h2>Stuck Tasks</h2>
      <div style="font-size:40px;font-weight:800;color:${stuckN?'var(--red)':'var(--d-finance)'}">${stuckN}</div>
      <div class="sub">${stuckN?'Needs attention — see Stuck Tasks on the dashboard.':'Nothing stuck right now.'}</div>
    </div>
  </div>
  <div class="card sect" style="margin-top:16px">
    <h2>✓ Completed Tasks (Archive) <span class="cnt">${completed.length}</span></h2>
    <div class="sub" style="margin:-6px 0 12px;color:var(--muted2)">Every completed task is kept here for history — completed one-off tasks and each completed recurring instance. Use the board's <b>Completed</b> filter to search them.</div>
    ${completed.length?`<div style="overflow-x:auto"><table>
      <thead><tr><th>Task</th><th>Owner</th><th>Manager</th><th>Department</th><th>Cadence</th><th>Completed</th><th>By</th><th>Start</th><th>Due</th><th>Last Update</th><th>File</th></tr></thead>
      <tbody>${completedRows}</tbody></table></div>${completed.length>200?'<div class="sub" style="margin-top:8px">Showing the 200 most recent.</div>':''}`
      :'<div class="empty">No completed tasks yet.</div>'}
  </div>`;
}

/* ---- Calendar -------------------------------------------------------------- */
function viewCalendar(){
  const ref=state.calRef; const y=ref.getFullYear(), m=ref.getMonth();
  const first=new Date(y,m,1); const startDow=(first.getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<startDow;i++){ const d=new Date(y,m,1-(startDow-i)); cells.push({date:d,out:true}); }
  for(let d=1;d<=daysInMonth;d++) cells.push({date:new Date(y,m,d),out:false});
  while(cells.length%7!==0){ const last=cells[cells.length-1].date; cells.push({date:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),out:true}); }

  const key=dt=>{ return new Date(dt.getTime()-dt.getTimezoneOffset()*60000).toISOString().slice(0,10); };
  const tasksByDay={};
  state.tasks.forEach(t=>{ if(!t.dueDate) return; (tasksByDay[t.dueDate]=tasksByDay[t.dueDate]||[]).push(t); });
  Object.values(tasksByDay).forEach(arr=>arr.sort((a,b)=>(a.dueTime||"")>(b.dueTime||"")?1:-1));

  const dows=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const todayK=todayStr();
  const grid=cells.map(c=>{
    const k=key(c.date);
    const list=tasksByDay[k]||[];
    const pills=list.slice(0,3).map(t=>`
      <div class="calpill" style="border-left-color:${DEPT_COLOR[t.department]}">
        <span class="ini" style="background:${DEPT_COLOR[t.department]}">${esc(initials(t.owner||'?'))}</span>
        <span style="overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</span>
        <span class="ct">${fmtTime(t.dueTime)}</span>
      </div>`).join("");
    const more=list.length>3?`<div class="more">+${list.length-3} more</div>`:'';
    return `<div class="cell ${c.out?'out':''} ${k===todayK?'today':''}" data-day="${k}">
      <div class="dnum">${c.date.getDate()}</div>${pills}${more}
    </div>`;
  }).join("");

  return `<div class="page-head"><div><h1>Calendar</h1><div class="sub">Tasks shown by due date &amp; time</div></div></div>
    <div class="calbar">
      <button class="btn sm" id="calPrev">‹ Prev</button>
      <h2>${ref.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2>
      <button class="btn sm" id="calNext">Next ›</button>
      <button class="btn sm" id="calToday">Today</button>
    </div>
    <div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${grid}</div>`;
}
function bindCalendar(c){
  $("#calPrev").onclick=()=>{ state.calRef=new Date(state.calRef.getFullYear(),state.calRef.getMonth()-1,1); renderContent(); };
  $("#calNext").onclick=()=>{ state.calRef=new Date(state.calRef.getFullYear(),state.calRef.getMonth()+1,1); renderContent(); };
  $("#calToday").onclick=()=>{ state.calRef=new Date(); renderContent(); };
  c.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{ state.drawer={type:"day",date:el.dataset.day}; renderDrawer(); });
}

function bindSettings(c){
  $("#saveSb").onclick=async()=>{
    if(!requireAdmin()) return;
    state.cfg.supabaseUrl=$("#sbUrl").value.trim().replace(/\/+$/,"");
    state.cfg.supabaseAnon=$("#sbKey").value.trim();
    saveConfig(); await connect(); await loadTasks(); toast(state.mode==='live'?"Connected to Supabase":"Could not connect — demo mode"); render();
  };
  $("#saveGc").onclick=async()=>{
    if(!requireAdmin()) return;
    state.cfg.reminderLeadMin=parseInt($("#gcLead").value,10)||120;
    saveConfig(); await persistSharedSettings(); toast("Notification settings saved");
  };
  $("#testGc").onclick=async()=>{
    const me=contactFor(state.user);
    if(!me || !me.email){ toast("Add your name + email in the directory below first"); return; }
    const fields=taskEmailFields({name:"Test notification",owner:state.user,manager:"",department:"Operations",priority:"Normal",status:"To Do",startDate:todayStr(),startTime:"09:00",dueDate:todayStr(),dueTime:"17:00",attachments:[]});
    try{
      const r=await emailRequest({to:me.email,cc:"",kind:"Test Notification",event:"test",task:fields});
      const data=await r.json().catch(()=>({}));
      if(r.ok){ toast("Test email sent to "+me.email); }
      else { alert("Test failed:\n\n"+(data.error||("HTTP "+r.status))+"\n\nFix: open "+EMAIL_ENDPOINT+" in a browser to check the server config, then confirm RESEND_API_KEY / RESEND_FROM are set in Vercel and redeploy."); }
    }catch(e){ alert("Test failed: "+(e.message||e)); }
  };
  c.querySelectorAll("[data-team]").forEach(el=>el.onchange=()=>{ if(!isAdmin()){ renderContent(); return; } state.cfg.team[+el.dataset.i][el.dataset.team]=el.value; });
  c.querySelectorAll("[data-teamdel]").forEach(el=>el.onclick=()=>{ if(!requireAdmin()) return; state.cfg.team.splice(+el.dataset.teamdel,1); saveConfig(); renderContent(); });
  $("#addMember").onclick=()=>{ if(!requireAdmin()) return; state.cfg.team.push({name:"New Member",department:"Operations",role:"",email:"",phone:""}); saveConfig(); renderContent(); };
  $("#saveTeam").onclick=async()=>{ if(!requireAdmin()) return; saveConfig(); await persistSharedSettings(); toast("Team directory saved"); render(); };
}

function renderDrawer(){
  const root=$("#drawer-root");
  if(!state.drawer){ root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl"></div>`; return; }
  if(state.drawer.type==="task") return renderTaskDrawer();
  if(state.drawer.type==="day") return renderDayDrawer();
}
function closeDrawer(){ state.drawer=null;
  const s=$("#scrim"), d=$("#drawerEl"); if(s)s.classList.remove("show"); if(d)d.classList.remove("show");
}
function drawerShell(inner){
  const root=$("#drawer-root");
  root.innerHTML=`<div class="scrim" id="scrim"></div><div class="drawer" id="drawerEl">${inner}</div>`;
  requestAnimationFrame(()=>{ $("#scrim").classList.add("show"); $("#drawerEl").classList.add("show"); });
  $("#scrim").onclick=closeDrawer;
  const x=$("#drawerClose"); if(x)x.onclick=closeDrawer;
}

        <div style="font-size:18px;font-weight:700">${esc(t.name)}</div>
        ${od?'<div class="overdue-txt" style="font-size:12px;margin-top:4px">● Overdue</div>':''}

/* ===========================================================================
   SPREADSHEET IMPORT (CSV file or paste from Excel/Google Sheets)
   =========================================================================== */
const IMPORT_FIELDS = {
  name:["name","task","task name","title"],
  owner:["owner","assignee","assigned to","assigned"],
  manager:["manager"],
  department:["department","dept"],
  priority:["priority"],
  status:["status"],
  startDate:["startdate","start date","start"],
  startTime:["starttime","start time"],
  dueDate:["duedate","due date","due"],
  dueTime:["duetime","due time"],
  cadence:["cadence","recurrence","repeat"],
  requiresApproval:["requiresapproval","requires approval","approval"],
  notes:["notes","note","description"],
  attachment:["attachment","file","link","attachment link","file / attachment link"]
};
const IMPORT_HEADERS = Object.keys(IMPORT_FIELDS);

function parseDelimited(text, delim){
  const rows=[]; let row=[], field="", q=false;
  text = String(text).replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; }
      else field+=c;
    } else {
      if(c==='"') q=true;
      else if(c===delim){ row.push(field); field=""; }
      else if(c==="\n"){ row.push(field); rows.push(row); row=[]; field=""; }
      else field+=c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function matchOne(v, list, fallback){
  const s=String(v||"").trim().toLowerCase();
  if(!s) return fallback;
  return list.find(o=>o.toLowerCase()===s) || fallback;
}
function normDate(s){
  s=String(s||"").trim(); if(!s) return "";
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  let m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if(m){ let y=m[3]; if(y.length===2) y="20"+y; return `${y}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`; }
  const d=new Date(s); if(!isNaN(d)) return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
  return s;
}
function normTime(s){
  s=String(s||"").trim(); if(!s) return "";
  let m=s.match(/^(\d{1,2}):(\d{2})\s*([ap]m)?$/i);
  if(m){ let h=+m[1]; const ap=(m[3]||"").toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":"+m[2]; }
  m=s.match(/^(\d{1,2})\s*([ap]m)$/i);
  if(m){ let h=+m[1]; const ap=m[2].toLowerCase(); if(ap==="pm"&&h<12)h+=12; if(ap==="am"&&h===12)h=0; return String(h).padStart(2,"0")+":00"; }
  return s;
}
function rowsToTasks(rows){
  if(!rows || !rows.length) return {tasks:[], skipped:0, error:"No rows found."};
  const header = rows[0].map(h=>String(h||"").trim().toLowerCase());
  const colField={};
  header.forEach((h,idx)=>{ for(const f of IMPORT_HEADERS){ if(IMPORT_FIELDS[f].includes(h)){ colField[idx]=f; break; } } });
  if(!Object.values(colField).includes("name"))
    return {tasks:[], skipped:0, error:"No 'name' (or 'task') column found in the first row. The first row must be a header."};
  const tasks=[]; let skipped=0;
  for(let r=1;r<rows.length;r++){
    const cells=rows[r];
    if(!cells || cells.every(c=>!String(c||"").trim())) continue;
    const o={}; cells.forEach((v,idx)=>{ if(colField[idx]!=null) o[colField[idx]]=String(v==null?"":v).trim(); });
    if(!o.name){ skipped++; continue; }
    const t=blankTask();
    t.name=o.name;
    if(o.owner) t.owner=o.owner;
    if(o.manager) t.manager=o.manager;
    t.department=matchOne(o.department, DEPARTMENTS, "Operations");
    t.priority=matchOne(o.priority, PRIORITIES, "Normal");
    t.status=matchOne(o.status, STATUSES, "") || mapStatus(o.status);
    t.cadence=matchOne(o.cadence, CADENCES, "One Off");
    t.requiresApproval=/^(yes|y|true|1)$/i.test(o.requiresApproval||"");
    if(o.startDate) t.startDate=normDate(o.startDate);
    if(o.startTime) t.startTime=normTime(o.startTime);
    if(o.dueDate) t.dueDate=normDate(o.dueDate);
    if(o.dueTime) t.dueTime=normTime(o.dueTime);
    if(o.notes) t.notes=o.notes;
    if(o.attachment) t.attachments=[{name:o.attachment, url:o.attachment, notes:""}];
    tasks.push(t);
  }
  return {tasks, skipped, error:null};
}
function csvCell(v){ v=String(v==null?"":v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function downloadTemplate(){
  const sample=["Run weekly payroll","Lisa","Sammy","Finance","High","To Do","2026-06-23","09:00","2026-06-23","17:00","Weekly","Yes","Verify hours first","https://drive.google.com/your-file"];
  const csv=[IMPORT_HEADERS, sample].map(r=>r.map(csvCell).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="task-import-template.csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function openImportModal(){ if(!requireAdmin()) return; state.modal={type:"import", parsed:null, skipped:0, error:null, sendEmails:false}; renderModal(); }
function doParseImport(text){
  text=String(text||"").trim();
  if(!text){ state.modal.error="Nothing to parse — paste rows or choose a CSV file."; state.modal.parsed=null; renderModal(); return; }
  const firstLine=text.split("\n")[0];
  const delim = (firstLine.split("\t").length > firstLine.split(",").length) ? "\t" : ",";
  const res=rowsToTasks(parseDelimited(text, delim));
  state.modal.error=res.error; state.modal.parsed=res.error?null:res.tasks; state.modal.skipped=res.skipped||0;
  renderModal();
}
async function doImport(tasks, sendEmails){
  if(!requireAdmin()) return;
  let n=0;
  for(const t of tasks){
    if(!sendEmails) ensureNotif(t).assigned=true;   // suppress assignment email unless asked
    addActivity(t, "Imported from spreadsheet");
    state.tasks.push(t);
    await persistTask(t);
    if(sendEmails && t.owner){ await notifyAssigned(t, "created"); await persistTask(t); }
    n++;
  }
  closeModal();
  toast("Imported "+n+" task"+(n!==1?"s":""));
  render();
}

      <button class="btn primary" id="importGo" ${(p&&p.length)?'':'disabled style="opacity:.5;cursor:not-allowed"'}>Import${p&&p.length?' '+p.length+' task'+(p.length!==1?'s':''):''}</button></div>
  </div></div>`;
  $("#modalClose").onclick=closeModal; $("#modalCancel").onclick=closeModal;
  $("#dlTemplate").onclick=downloadTemplate;
  $("#parseBtn").onclick=()=>doParseImport($("#pasteArea").value);
  $("#csvFile").onchange=(e)=>{ const f=e.target.files && e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>doParseImport(String(rd.result)); rd.readAsText(f); };
  const ie=$("#impEmail"); if(ie) ie.onchange=()=>{ state.modal.sendEmails=ie.checked; };
  const go=$("#importGo"); if(go && p && p.length) go.onclick=()=>doImport(p, state.modal.sendEmails);
}

/* ===========================================================================
   BOOT
   =========================================================================== */
(async function init(){
  loadConfig();
  render();                 // initial paint
  await connect();
  await loadTasks();
  render();
  setInterval(()=>{ notificationScan(); }, 60000);
  setInterval(()=>{ if(!state.modal && !state.drawer) render(); }, 120000);
  setTimeout(notificationScan, 4000);
})();
</script>

<!--
================================================================================
 SETUP NOTES — Supabase SQL · Vercel · Email (Resend serverless function)
================================================================================

1) SUPABASE SQL
   The app uses one row per task in table `tasks` (id, data jsonb, updated_at).
   If the table does not already exist, run this in Supabase -> SQL Editor:

     create table if not exists public.tasks (
       id text primary key,
       data jsonb not null default '{}'::jsonb,
       updated_at timestamptz not null default now()
     );

     alter table public.tasks enable row level security;

     -- Internal shared board (anyone with the anon key can read/write).
     -- Tighten with Supabase Auth if you later need per-user restrictions.
     create policy "anon read"   on public.tasks for select using (true);
     create policy "anon insert" on public.tasks for insert with check (true);
     create policy "anon update" on public.tasks for update using (true) with check (true);
     create policy "anon delete" on public.tasks for delete using (true);

   New fields live inside each task's `data` JSON: requiresApproval, attachments[],
   and notif.approval (plus the existing notif.assigned / almost / overdue flags).
   Shared settings (reminder timing, team directory + emails) are stored in a single
   row with id = '__settings__'. The per-device user name is kept in localStorage.

2) VERCEL DEPLOY (static site)
   - Framework preset: Other. Build command: empty. Output directory: ./
   - vercel.json already enables clean URLs.
   - Optional build-time env vars: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
     (for plain static hosting you can just paste the URL + anon key in Settings).

3) EMAIL NOTIFICATIONS (Resend serverless function)
   The browser never holds an email API key. It POSTs the recipients + task
   fields to /api/send-email, which sends through Resend. The cron
   (api/cron-reminders.js) sends due-soon / overdue / assignment / approval
   emails server-side on a schedule. Files: api/send-email.js + lib/email.js.

   a) Create a Resend account (resend.com), add an API key, and (to email anyone
      other than yourself) verify a sending domain. Then set Vercel env vars:
        RESEND_API_KEY = re_xxx
        RESEND_FROM    = "Task Board <tasks@yourdomain.com>"   (a verified sender)
   b) For the cron (server-side reminders), also set:
        SUPABASE_URL, SUPABASE_ANON_KEY, CRON_SECRET, and optionally
        REMINDER_TIMEZONE (default America/New_York), REMINDER_LEAD_MIN (default 120),
        APP_URL (adds an "Open Task Board" link).
   c) Enter each owner's and manager's email in Settings -> Team & Email Addresses.
      Click "Send test email" to confirm.

   index.html calls it like:
     fetch('/api/send-email', { method:'POST', headers:{'Content-Type':'application/json'},
       body: JSON.stringify({ to, cc, kind, event, task }) });
================================================================================
